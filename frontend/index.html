/* ── PARTICLES ── */
let nrParts=[];
function nrEnsureCanvas(){
  if(document.getElementById('nr-pcv'))return;
  const c=document.createElement('canvas');c.id='nr-pcv';
  document.body.appendChild(c);
  c.width=innerWidth;c.height=innerHeight;
  window.addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight});
  (function loop(){
    const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
    nrParts=nrParts.filter(p=>p.life>0);
    for(const p of nrParts){p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=p.decay;p.rot+=p.rv;
      ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      if(p.sq)ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill()}
      ctx.restore()}
    ctx.globalAlpha=1;requestAnimationFrame(loop);
  })();
}
function nrBurst(x,y){
  nrEnsureCanvas();
  const cols=['#a855f7','#c084fc','#9333ea','#10b981','#fbbf24','#fff'];
  for(let i=0;i<44;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*6.5;
    nrParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3.5,life:1,
      decay:.017+Math.random()*.022,r:1.5+Math.random()*4,
      col:cols[~~(Math.random()*cols.length)],
      rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.3,sq:Math.random()>.65})}
}

/* ── HELPERS ── */
function nrCalcPct(){return NR_TASKS.length ? Math.round(NR_TASKS.filter(t=>t.done).length/NR_TASKS.length*100) : 0}
function nrDone(){return NR_TASKS.filter(t=>t.done).length}
function nrCountUp(id,to,suf){
  const el=document.getElementById(id);if(!el)return;
  const from=parseInt(el.textContent)||0;if(from===to){el.textContent=to+suf;return}
  let step=0;const iv=setInterval(()=>{step++;el.textContent=Math.round(from+(to-from)*step/10)+suf;if(step>=10)clearInterval(iv)},25);
}
function nrGetEl(id){return document.getElementById('nr-'+id)}

/* ── TASK RENDER ── */
function nrRenderTasks(){
  const ul=nrGetEl('tlist');if(!ul)return;ul.innerHTML='';
  NR_TASKS.forEach(t=>{
    const el=document.createElement('div');
    el.className='nr-task'+(t.done?' nr-done':'')+(NR_READONLY?' nr-readonly':'');
    el.dataset.nrid=t.id;
    el.innerHTML=`<div class="nr-cb"><svg class="nr-csym" viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg></div>
      <div class="nr-ti"><div class="nr-tn">${t.name}</div><div class="nr-ts">${t.sub}</div></div>
      <span class="nr-ttag">${t.tag}</span>`;
    if(!NR_READONLY) el.addEventListener('click',ev=>nrToggle(t.id,ev));
    ul.appendChild(el);
  });
}

/* ── TOGGLE ── */
function nrToggle(id,ev){
  if(NR_READONLY)return;
  const t=NR_TASKS.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;
  if(t.done)NR_STREAK++;else NR_STREAK=Math.max(0,NR_STREAK-1);
  const el=document.querySelector(`.nr-task[data-nrid="${id}"]`);
  if(el){
    el.classList.toggle('nr-done',t.done);el.classList.add('nr-pop');
    el.addEventListener('animationend',()=>el.classList.remove('nr-pop'),{once:true});
    if(t.done&&ev){nrBurst(ev.clientX,ev.clientY)}
  }
  const pct=nrCalcPct();NR_HIST.push(pct);
  nrRefreshAll(pct);nrSave();
  showToast(t.done?`✦ ${t.name} concluída`:`↩ ${t.name} reaberta`);
}

/* ── REFRESH ALL ── */
function nrRefreshAll(pct){
  const done=nrDone(),total=NR_TASKS.length;
  const fill=nrGetEl('fill');
  if(fill){fill.style.width=pct+'%';fill.className='nr-fill'+(pct>0?' on':'')}
  const pvEl=nrGetEl('pv');if(pvEl)pvEl.textContent=`${done} de ${total}`;
  const badgeEl=nrGetEl('badge');if(badgeEl){badgeEl.textContent=`${done} / ${total}`;badgeEl.className='nr-pill'+(done===total?' done':'')}
  const motEl=nrGetEl('mot');if(motEl&&!NR_READONLY)motEl.textContent=NR_MOTS[done];
  const rfg=nrGetEl('rfg');if(rfg)rfg.style.strokeDashoffset=345-345*pct/100;
  const rpct=nrGetEl('rpct');if(rpct){rpct.textContent=pct+'%';rpct.className='nr-ring-pct'+(pct===100?' done':'')}
  nrCountUp('sn0',done,'');
  const sb0=nrGetEl('sb0');if(sb0)sb0.style.width=(done/total*100)+'%';
  const sn0=nrGetEl('sn0');if(sn0)sn0.className='nr-stat-num'+(done>0?' lit':'');
  nrCountUp('sn1',total-done,'');
  const sb1=nrGetEl('sb1');if(sb1)sb1.style.width=((total-done)/total*100)+'%';
  nrCountUp('sn2',pct,'%');
  const sb2=nrGetEl('sb2');if(sb2)sb2.style.width=pct+'%';
  const sn2=nrGetEl('sn2');if(sn2)sn2.className='nr-stat-num'+(pct>0?' lit':'');
  nrCountUp('sn3',NR_READONLY?done:NR_STREAK,'');
  const sb3=nrGetEl('sb3');if(sb3)sb3.style.width=(NR_STREAK/total*100)+'%';
  const sn3=nrGetEl('sn3');if(sn3)sn3.className='nr-stat-num'+(NR_STREAK>=2?' glit':'');
  const bp=nrGetEl('barpill');if(bp)bp.textContent=pct+'%';
  const dfg=nrGetEl('dfg');if(dfg)dfg.style.strokeDashoffset=238-238*pct/100;
  const dl1=nrGetEl('dl1');if(dl1)dl1.textContent=total-done;
  const dl2=nrGetEl('dl2');if(dl2)dl2.textContent=done;
  const dl3=nrGetEl('dl3');if(dl3)dl3.textContent=pct+'%';
  nrRenderBars(NR_TASKS);nrDrawLine(NR_HIST);
  if(!NR_READONLY)nrShowReward(done);
  else{const rw=nrGetEl('reward');if(rw)rw.classList.remove('show')}
}

/* ── LINE CHART ── */
function nrSmooth(xs,ys){if(xs.length<2)return`M${xs[0]},${ys[0]}`;let d=`M${xs[0]},${ys[0]}`;
  for(let i=1;i<xs.length;i++){const cx=(xs[i-1]+xs[i])/2;d+=` C${cx},${ys[i-1]} ${cx},${ys[i]} ${xs[i]},${ys[i]}`}return d}
function nrDrawLine(pts){
  const n=pts.length,LW=340,LH=120,LP=14,RP=14,TP=12,BP=10;
  const xs=pts.map((_,i)=>LP+(i/Math.max(n-1,1))*(LW-LP-RP));
  const ys=pts.map(v=>TP+(1-v/100)*(LH-TP-BP));
  const line=nrSmooth(xs,ys);
  const llp=nrGetEl('llp'),lap=nrGetEl('lap');
  if(llp)llp.setAttribute('d',line);
  if(lap)lap.setAttribute('d',line+` L${xs[n-1]},${LH-BP} L${xs[0]},${LH-BP} Z`);
  try{if(llp){const len=llp.getTotalLength()||300;llp.style.strokeDasharray=len;llp.style.strokeDashoffset=len;
    llp.style.transition='none';void llp.getBoundingClientRect();
    llp.style.transition='stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)';llp.style.strokeDashoffset=0}}catch(e){}
  const dg=nrGetEl('ldg');if(!dg)return;dg.innerHTML='';
  xs.forEach((x,i)=>{const last=i===n-1;const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',x);c.setAttribute('cy',ys[i]);c.setAttribute('r',last?'5':'3');
    c.setAttribute('fill',last?'#c084fc':'#9333ea');c.setAttribute('opacity',last?'1':'.4');
    if(last){const p=document.createElementNS('http://www.w3.org/2000/svg','circle');
      p.setAttribute('cx',x);p.setAttribute('cy',ys[i]);p.setAttribute('r','5');
      p.setAttribute('fill','none');p.setAttribute('stroke','#c084fc');p.setAttribute('stroke-width','1.5');
      p.style.animation='nrDot 1.6s ease-in-out infinite';p.style.opacity='.5';dg.appendChild(p)}
    dg.appendChild(c)});
  const xl=nrGetEl('xlabs');if(xl){xl.innerHTML='';pts.forEach((_,i)=>{const s=document.createElement('span');s.textContent=i===0?'início':`T${i}`;xl.appendChild(s)})}
}

/* ── VIEW DATE (history) ── */
async function nrViewDate(key){
  const data=await nrGetDay(key);
  const dateStr=key.replace('nrday:','');
  const [y,m,d]=dateStr.split('-').map(Number);
  const dObj=new Date(y,m-1,d);
  const fmt=`${NR_WDAYS[dObj.getDay()]}, ${nrPad(d)} de ${NR_MONTHS[m-1]}`;

  NR_READONLY=true;NR_VIEWKEY=key;
  const vb=nrGetEl('vbanner');if(vb){vb.classList.add('show');const vbd=nrGetEl('vbdate');if(vbd)vbd.textContent=fmt}
  const ey=nrGetEl('eyebrow');if(ey)ey.textContent=fmt.toUpperCase();
  const hem=nrGetEl('heroem');if(hem)hem.textContent='Histórico';
  const hsub=nrGetEl('herosub');if(hsub)hsub.textContent=`${nrPad(d)} de ${NR_MONTHS[m-1]} de ${y}`;
  const tct=nrGetEl('tcardtitle');if(tct)tct.textContent=`Tarefas · ${nrPad(d)}/${nrPad(m)}/${y}`;
  const ld=nrGetEl('livedot');if(ld){ld.style.background='var(--warn)';ld.style.boxShadow='0 0 6px var(--warn)'}
  const ll=nrGetEl('livelabel');if(ll)ll.textContent='Histórico';
  nrCloseModal();

  if(!data){
    // reset to empty and show suggestions
    NR_TASKS=nrBuildTasksFromRoutine();
    nrRenderTasks();nrRenderBars(NR_TASKS);nrDrawLine([0]);nrRefreshAll(0);
    const motEl=nrGetEl('mot');if(motEl)motEl.textContent=`Nenhum dado para ${fmt}.`;
    await nrShowNoData(dateStr);
    return;
  }

  const viewTasks=nrBuildTasksFromRoutine().map(def=>{const st=data.tasks.find(x=>x.id===def.id);return{...def,done:st?st.done:false}});
  NR_TASKS=viewTasks;
  let running=0;const pts=[0];
  viewTasks.forEach(t=>{if(t.done){running+=Math.round(100/Math.max(NR_TASKS.length,1));pts.push(Math.min(running,100))}});
  const pct=data.pct;
  const motEl=nrGetEl('mot');
  if(motEl)motEl.textContent=pct===100?'✦ Dia perfeito. Tudo foi concluído.':pct>=70?`Ótimo dia — ${pct}% concluído.`:pct>=40?`Bom progresso — ${pct}% neste dia.`:`Dia difícil — ${pct}% concluído. Tudo bem.`;
  nrRenderTasks();nrRefreshAll(pct);nrDrawLine(pts);
  showToast(`📅 Visualizando ${fmt}`);
}

async function nrShowNoData(dateStr){
  const ul=nrGetEl('tlist');if(!ul)return;ul.innerHTML='';
  const allK=await nrGetAllKeys();
  const wrap=document.createElement('div');wrap.className='nr-nodata';
  if(allK.length===0){
    wrap.innerHTML=`<div class="nr-nodata-icon">📭</div>
      <div class="nr-nodata-title">Sem dados para ${dateStr}</div>
      <div class="nr-nodata-sub">Nenhum registro ainda. Volte para Hoje e comece a marcar!</div>`;
  } else {
    const loaded=[];
    for(const k of allK){const d=await nrGetDay(k);if(d)loaded.push({key:k,data:d})}
    loaded.sort((a,b)=>b.key.localeCompare(a.key));
    wrap.innerHTML=`<div class="nr-nodata-icon">📭</div>
      <div class="nr-nodata-title">Sem dados para esta data</div>
      <div class="nr-nodata-sub">Não há registro para <strong>${dateStr}</strong>. Dias em que você usou a Rotina:</div>
      <div class="nr-sug-list" id="nr-suglist"></div>`;
    ul.appendChild(wrap);
    const sl=document.getElementById('nr-suglist');
    loaded.slice(0,5).forEach(({key,data})=>{
      const ds=key.replace('nrday:','');const [y,m,d]=ds.split('-').map(Number);
      const dObj=new Date(y,m-1,d);
      const lbl=`${NR_WDAYS[dObj.getDay()]}, ${nrPad(d)} de ${NR_MONTHS[m-1]}`;
      const btn=document.createElement('div');btn.className='nr-sug';
      btn.innerHTML=`<span class="nr-sug-date">${lbl}</span><span class="nr-sug-pct${data.pct===100?' perf':''}">${data.pct===100?'🏆 Perfeito':data.pct+'%'}</span>`;
      btn.addEventListener('click',()=>nrViewDate(key));sl.appendChild(btn);
    });
    return;
  }
  ul.appendChild(wrap);
}

/* ── CALENDAR MODAL ── */
function nrOpenModal(){
  const bg=document.getElementById('nr-modalbg');if(bg)bg.classList.add('open');
  nrGetAllKeys().then(keys=>{nrAllKeys=keys;nrSelKey=null;
    const sb=document.getElementById('nr-selbtn');if(sb)sb.classList.remove('active');
    nrRenderCal();});
}
function nrCloseModal(){const bg=document.getElementById('nr-modalbg');if(bg)bg.classList.remove('open')}
function nrRenderCal(){
  const mEl=document.getElementById('nr-calmonth');if(mEl)mEl.textContent=`${NR_MONTHS[nrCalM]} ${nrCalY}`;
  const grid=document.getElementById('nr-calgrid');if(!grid)return;grid.innerHTML='';
  NR_DOW.forEach(d=>{const el=document.createElement('div');el.className='nr-cal-dow';el.textContent=d;grid.appendChild(el)});
  const now=new Date();const todayStr=`${now.getFullYear()}-${nrPad(now.getMonth()+1)}-${nrPad(now.getDate())}`;
  const first=new Date(nrCalY,nrCalM,1).getDay();const days=new Date(nrCalY,nrCalM+1,0).getDate();
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='nr-cal-day nr-emp';grid.appendChild(el)}
  for(let d=1;d<=days;d++){
    const dStr=`${nrCalY}-${nrPad(nrCalM+1)}-${nrPad(d)}`;
    const key=`nrday:${dStr}`;
    const isToday=dStr===todayStr;
    const isFut=new Date(nrCalY,nrCalM,d)>now&&!isToday;
    const has=nrAllKeys.includes(key)||isToday;
    const el=document.createElement('div');
    el.className='nr-cal-day'+(isToday?' nr-today':'')+(isFut?' nr-fut':'')+(has?' nr-has':'')+(nrSelKey===key?' nr-sel':'');
    el.textContent=d;el.dataset.key=key;
    if(!isFut){el.addEventListener('click',()=>{
      nrSelKey=key;document.querySelectorAll('.nr-cal-day').forEach(x=>x.classList.remove('nr-sel'));
      el.classList.add('nr-sel');
      const sb=document.getElementById('nr-selbtn');if(sb){sb.classList.add('active');
        sb.textContent=isToday?'Visualizar Hoje →':`Visualizar ${nrPad(d)}/${nrPad(nrCalM+1)} →`}
    })}
    grid.appendChild(el);
  }
  nrAllKeys.forEach(async k=>{
    const d=await nrGetDay(k);if(d?.pct===100){const el=document.querySelector(`.nr-cal-day[data-key="${k}"]`);if(el)el.classList.add('nr-perf')}
  });
}

/* State — scoped to this module */
let _HI_DONE = new Set();
let _HI_WCHART = null;

let _HI_HABITS = [];
let _HI_TOTAL = 0;

function _hiEsc(t){
  return String(t ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function _hiIsGenericHabitName(name){
  const n = String(name || '').trim().toLowerCase();
  const exact = new Set(['beber 2l de água','beber 2l de agua','beber água','beber agua','estudar 1 hora','treinar','acordar antes das 7h','trabalhar no projeto','ler 10 minutos','exercício físico','exercicio fisico','rotina matinal']);
  const parts = ['2l de','beber água','beber agua','estudar 1 hora','acordar antes','ler 10'];
  return exact.has(n) || parts.some(x => n.includes(x));
}

function _hiBuildHabitRows(){
  const rows = Array.isArray(HABITS) ? HABITS : [];
  return rows
    .filter(h => h && String(h.name || h.title || '').trim())
    .filter(h => !_hiIsGenericHabitName(h.name || h.title || ''))
    .map((h, i) => {
      const goal = h.goal ?? h.goal_value ?? 1;
      const unit = h.unit ?? h.goal_unit ?? 'vez';
      const days = Array.isArray(h.days) ? h.days : [];
      const doneToday = Boolean(h.done || h.completed_today || h.today_done);
      const streak = Number(h.streak ?? h.current_streak ?? days.length ?? 0) || 0;
      return {
        id: h.id ?? `habit-${i}`,
        icon: h.icon || '⭐',
        name: String(h.name || h.title || '').trim(),
        meta: `${goal} ${unit}`.trim(),
        streak,
        bar: Math.max(0, Math.min(100, Number(h.pct ?? h.progress ?? (doneToday ? 100 : 0)) || 0)),
        done: doneToday,
        source: h.source || 'db'
      };
    });
}


function _hiSparkles(el){
  const r=el.getBoundingClientRect();
  for(let i=0;i<8;i++){
    const sp=document.createElement('div');sp.className='hi-sp';
    const sz=3+Math.random()*6;
    sp.style.cssText=`left:${r.left+Math.random()*r.width}px;top:${r.top+r.height*.5}px;
      width:${sz}px;height:${sz}px;background:var(--accent);
      --htx:${(Math.random()-.5)*70}px;--hty:${-(20+Math.random()*55)}px;
      animation-delay:${Math.random()*.2}s;`;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),1000);
  }
}

function _hiToggle(id){
  const el=document.getElementById(`hi-hr${id}`);
  if(!el)return;
  _HI_DONE.has(id)?_HI_DONE.delete(id):_HI_DONE.add(id);
  el.classList.toggle('hi-done',_HI_DONE.has(id));
  const bar=document.getElementById(`hi-b${id}`);
  if(bar)bar.style.width=_HI_DONE.has(id)?'100%':_HI_HABITS.find(h=>h.id===id).bar+'%';
  if(_HI_DONE.has(id))_hiSparkles(el);
  _hiUpdate();
}

function _hiUpdate(){
  const n=_HI_DONE.size;
  const pct=Math.round((n/_HI_TOTAL)*100);
  const tf=document.getElementById('hi-tbfill');
  if(tf){tf.style.width=pct+'%';tf.classList.toggle('lit',n>0)}
  const tn=document.getElementById('hi-tbn');if(tn)tn.textContent=`${n} / ${_HI_TOTAL}`;
  const msgs=['Comece seu dia ✦','Bom início ✦','Na metade ✦','Quase lá ✦','Dia perfeito ✦'];
  const tm=document.getElementById('hi-tbmsg');if(tm)tm.textContent=msgs[Math.min(n,4)];
  const hs=document.getElementById('hi-hsdone');if(hs)hs.textContent=n;
  const base=64,total=Math.min(100,base+(n/_HI_TOTAL)*36);
  const C=2*Math.PI*65;
  const fg=document.getElementById('hi-rfg');if(fg)fg.style.strokeDashoffset=C-(total/100)*C;
  const rn=document.getElementById('hi-rn');if(rn)rn.textContent=Math.round(total)+'%';
  const df=document.getElementById('hi-dmfill');if(df)df.style.width=total+'%';

function _hiInitCharts(){
  if(typeof Chart==='undefined')return;
  const isDark=document.body.classList.contains('dark-theme');
  const gc=isDark?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
  const tc=isDark?'#555':'#bbb';
  const acc='rgba(168,85,247,';
  const baseOpts=(extra={})=>({responsive:true,maintainAspectRatio:false,
    animation:{duration:900,easing:'easeOutQuart'},
    plugins:{legend:{display:false},tooltip:{backgroundColor:isDark?'#111':'#fff',borderColor:isDark?'#222':'#eee',borderWidth:1,padding:9,cornerRadius:8,titleFont:{size:10},bodyFont:{size:11},titleColor:isDark?'#ccc':'#333',bodyColor:isDark?'#aaa':'#555'}},
    scales:{x:{grid:{color:gc,drawBorder:false},ticks:{font:{size:9},color:tc}},y:{grid:{color:gc,drawBorder:false},ticks:{font:{size:9},color:tc}}},...extra});

  /* Week bars */
  const wCtx=document.getElementById('hi-cw');
  if(wCtx){
    _HI_WCHART=new Chart(wCtx,{type:'bar',data:{labels:['Seg','Ter','Qua','Qui','Sex','Sáb','Hj'],
      datasets:[{data:[3,5,4,6,4,5,0],
        backgroundColor:Array(7).fill(0).map((_,i)=>i===6?'rgba(168,85,247,.8)':'rgba(168,85,247,.3)'),
        borderRadius:4,borderSkipped:false}]},
      options:baseOpts({scales:{x:{...baseOpts().scales.x},y:{...baseOpts().scales.y,min:0,max:7,ticks:{stepSize:1,font:{size:9},color:tc}}}})});
  }

  /* Score line */
  const sCtx=document.getElementById('hi-cs');
  if(sCtx){
    const ctx2=sCtx.getContext('2d');
    const g1=ctx2.createLinearGradient(0,0,0,140);
    g1.addColorStop(0,acc+'.14)');g1.addColorStop(1,acc+'0)');
    const l30=Array.from({length:30},(_,i)=>`${i+1}`);
    const v30=Array.from({length:30},(_,i)=>+(2.8+Math.sin(i/4)*.3+i*.038).toFixed(2));
    new Chart(sCtx,{type:'line',data:{labels:l30,datasets:[
      {data:v30,borderColor:'rgba(168,85,247,.9)',borderWidth:1.5,backgroundColor:g1,fill:true,tension:.45,pointRadius:0,pointHoverRadius:4},
      {data:Array(30).fill(4.0),borderColor:'rgba(168,85,247,.2)',borderWidth:1,borderDash:[4,4],fill:false,pointRadius:0}
    ]},options:baseOpts()});
  }

  /* Area horiz */
  const aCtx=document.getElementById('hi-ca');
  if(aCtx){
    new Chart(aCtx,{type:'bar',data:{labels:['Projeto','Estudo','Rotina','Saúde','Hábitos','Meditação'],
      datasets:[{data:[82,74,68,61,52,45],
        backgroundColor:['rgba(168,85,247,.7)','rgba(168,85,247,.55)','rgba(168,85,247,.45)','rgba(168,85,247,.35)','rgba(168,85,247,.25)','rgba(168,85,247,.15)'],
        borderRadius:3,borderSkipped:false}]},
      options:baseOpts({indexAxis:'y',scales:{x:{...baseOpts().scales.x,min:0,max:100,ticks:{callback:v=>v+'%',font:{size:9},color:tc}},y:{...baseOpts().scales.y}}})});
  }
}

  (function initPlano(){
    /* year progress */
    const now=new Date();
    const pct=Math.round(((now-new Date(now.getFullYear(),0,1))/(new Date(now.getFullYear()+1,0,1)-new Date(now.getFullYear(),0,1)))*100);
    setTimeout(()=>{
      const fill=document.getElementById('plano-prog-fill');
      const lbl=document.getElementById('plano-prog-label');
      if(fill) fill.style.width=pct+'%';
      if(lbl)  lbl.textContent=pct+'% concluído';
    },220);

    /* intersection observer for section reveals */
    const io=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(!e.isIntersecting) return;
        e.target.classList.add('visible');
        io.unobserve(e.target);
      });
    },{threshold:0.08});
    s.querySelectorAll('.p-section').forEach((sec,i)=>{
      sec.style.transitionDelay=(i*70)+'ms';
      io.observe(sec);
    });
  })();
}

function mt6_buildHist(){
  let xp=0;const pts=[0];
  (mt6_goals||mt6_DEF).filter(g=>g.done&&g.doneAt).sort((a,b)=>new Date(a.doneAt)-new Date(b.doneAt))
    .forEach(g=>{xp+=mt6_XP[g.level];pts.push(xp)});
  return pts;
}
function mt6_save(){
  localStorage.setItem('mt6:g',JSON.stringify(mt6_goals));
  localStorage.setItem('mt6:h',JSON.stringify(mt6_hist));
  try{if(window.storage)window.storage.set('mt6:data',JSON.stringify({goals:mt6_goals,hist:mt6_hist}))}catch(e){}
}
function mt6_totalXP(){return(mt6_goals||[]).filter(g=>g.done).reduce((s,g)=>s+mt6_XP[g.level],0)}
function mt6_doneG(){return(mt6_goals||[]).filter(g=>g.done)}
function mt6_visGoals(){
  let g=mt6_goals||[];
  if(mt6_sbFilter==='pending')g=g.filter(x=>!x.done);
  else if(mt6_sbFilter==='done')g=g.filter(x=>x.done);
  if(mt6_sbCat!=='all')g=g.filter(x=>x.cat===mt6_sbCat);
  return g;
}
function mt6_estProg(g){
  if(!g.createdAt||!g.months)return 10;
  return Math.min(Math.round((Date.now()-new Date(g.createdAt))/(1000*60*60*24*30)/g.months*100),90);
}
function mt6_calcStreak(){
  const today=new Date();today.setHours(0,0,0,0);let s=0,d=new Date(today);
  while(true){if(!mt6_doneG().some(g=>g.doneAt&&new Date(g.doneAt).toDateString()===d.toDateString()))break;s++;d.setDate(d.getDate()-1)}
  return s;
}
const mt6_$=id=>document.getElementById(id);
let mt6_toastT;
function mt6_toast(m,dur=2500){
  const el=mt6_$('mt6-toast');if(!el)return;
  el.textContent=m;el.classList.add('show');
  clearTimeout(mt6_toastT);mt6_toastT=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ── SPARKLINE ── */
function mt6_drawSparkline(gId,vals,color){
  const g=mt6_$(gId);if(!g)return;
  const n=vals.length;if(n<2){g.innerHTML='';return}
  const W=80,H=16;const mx=Math.max(...vals,1);
  const xs=vals.map((_,i)=>i/(n-1)*W);
  const ys=vals.map(v=>H-2-(v/mx)*(H-4));
  let d=`M${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
  for(let i=1;i<n;i++){const cx=(xs[i-1]+xs[i])/2;d+=` C${cx.toFixed(1)},${ys[i-1].toFixed(1)} ${cx.toFixed(1)},${ys[i].toFixed(1)} ${xs[i].toFixed(1)},${ys[i].toFixed(1)}`}
  g.innerHTML=`<path d="${d} L${W},${H} L0,${H} Z" fill="${color}" opacity=".12"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="${xs[n-1].toFixed(1)}" cy="${ys[n-1].toFixed(1)}" r="2" fill="${color}"/>`;
}
function mt6_drawSparklines(){
  const now=new Date();
  const monthly=[];let xpCum=0;const xpVals=[];
  for(let m=11;m>=0;m--){
    const s=new Date(now.getFullYear(),now.getMonth()-m,1);
    const e=new Date(now.getFullYear(),now.getMonth()-m+1,0);
    const g2=mt6_goals.filter(g=>g.doneAt&&new Date(g.doneAt)>=s&&new Date(g.doneAt)<=e);
    monthly.push(g2.length);
    xpCum+=g2.reduce((s2,g)=>s2+mt6_XP[g.level],0);xpVals.push(xpCum);
  }
  let cum=0;const cumV=monthly.map(v=>{cum+=v;return cum});
  mt6_drawSparkline('mt6-spg-tot',[...Array(12)].map((_,i)=>Math.max(mt6_goals.length-12+i+1,1)),'#5A6380');
  mt6_drawSparkline('mt6-spg-done',cumV,'#2EB67D');
  mt6_drawSparkline('mt6-spg-xp',xpVals,'#F5A623');
  mt6_drawSparkline('mt6-spg-str',[0,1,1,2,2,3,3,4,4,4,5,mt6_calcStreak()],'#3B82F6');
}

/* ── KPI ── */
function mt6_updateKPI(){
  const vg=mt6_visGoals();const tot=vg.length,done=vg.filter(g=>g.done).length;
  const pct=tot?Math.round(done/tot*100):0;const xp=mt6_totalXP();const str=mt6_calcStreak();
  const _s=(id,v)=>{const el=mt6_$(id);if(el)el.textContent=v};
  _s('mt6-kv-tot',tot);_s('mt6-kd-tot','metas');
  _s('mt6-kv-done',done);_s('mt6-kd-done',pct+'% taxa');
  _s('mt6-kv-xp',xp+' XP');_s('mt6-kv-str',str+'d');
  const tb=mt6_$('mt6-tbsub');if(tb)tb.textContent=`${done} de ${tot} concluídas · ${xp} XP`;
  const mp=mt6_$('mt6-mainpill');if(mp)mp.textContent=xp+' pts';
  mt6_drawSparklines();
}

/* ── MAIN CHART ── */
function mt6_smth(xs,ys){
  if(xs.length<2)return`M${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
  let d=`M${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
  for(let i=1;i<xs.length;i++){const cx=(xs[i-1]+xs[i])/2;d+=` C${cx.toFixed(1)},${ys[i-1].toFixed(1)} ${cx.toFixed(1)},${ys[i].toFixed(1)} ${xs[i].toFixed(1)},${ys[i].toFixed(1)}`}
  return d;
}
function mt6_drawMain(){
  const svg=mt6_$('mt6-mainsvg');if(!svg)return;
  const W=svg.getBoundingClientRect().width||560;
  const H=Math.max(110,Math.min(160,W*0.28));
  const PL=32,PR=9,PT=11,PB=19,cW=W-PL-PR,cH=H-PT-PB;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.style.height=H+'px';
  const pts=mt6_hist,n=pts.length;
  const mg=mt6_$('mt6-mgrid'),mc=mt6_$('mt6-mchart'),md=mt6_$('mt6-mdots');
  if(!mg||!mc||!md)return;
  if(n<2){mg.innerHTML=`<text x="${W/2}" y="${H/2}" font-family="DM Sans,sans-serif" font-size="11" fill="#9299B8" text-anchor="middle">Marque metas para ver a evolução</text>`;mc.innerHTML='';md.innerHTML='';return}
  const maxV=Math.max(...pts,1);
  const xs=pts.map((_,i)=>PL+i/Math.max(n-1,1)*cW);
  const ys=pts.map(v=>PT+cH-(v/maxV)*cH);
  const gridFs=W<380?[0,.5,1]:[0,.25,.5,.75,1];
  let grid='';
  gridFs.forEach(f=>{
    const yy=(PT+cH-f*cH).toFixed(1);const v=Math.round(maxV*f);
    grid+=`<line x1="${PL}" y1="${yy}" x2="${W-PR}" y2="${yy}" stroke="#E6E9F2" stroke-width="1"/>`;
    grid+=`<text x="${PL-3}" y="${(+yy+3).toFixed(1)}" font-family="DM Mono,monospace" font-size="7" fill="#9299B8" text-anchor="end">${v>=1000?Math.round(v/1000)+'k':v}</text>`;
  });
  const maxLbls=Math.max(2,Math.floor(W/65));const stepX=Math.max(1,Math.ceil(n/maxLbls));
  pts.forEach((_,i)=>{if(i===0||i===n-1||i%stepX===0)grid+=`<text x="${xs[i].toFixed(1)}" y="${H-3}" font-family="DM Mono,monospace" font-size="7" fill="#9299B8" text-anchor="middle">${i===0?'início':'T'+i}</text>`});
  mg.innerHTML=grid;
  if(mt6_chartMode==='line'){
    const line=mt6_smth(xs,ys);
    const area=line+` L${xs[n-1].toFixed(1)},${(PT+cH).toFixed(1)} L${xs[0].toFixed(1)},${(PT+cH).toFixed(1)} Z`;
    mc.innerHTML=`<path d="${area}" fill="url(#mt6aG)"/><path d="${line}" fill="none" stroke="url(#mt6lG)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#mt6glow)"/>`;
    md.innerHTML='';const showDots=n<=15;
    xs.forEach((x,i)=>{const last=i===n-1;if(!showDots&&!last)return;const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',x.toFixed(1));c.setAttribute('cy',ys[i].toFixed(1));c.setAttribute('r',last?'4':'2.5');c.setAttribute('fill',last?'#2EB67D':'#22915F');c.setAttribute('opacity',last?'1':'.5');if(last)c.setAttribute('filter','url(#mt6glow)');md.appendChild(c)});
    try{const lp=mc.querySelector('path:last-child');const len=lp.getTotalLength()||300;lp.style.strokeDasharray=len;lp.style.strokeDashoffset=len;lp.style.transition='none';void lp.getBoundingClientRect();lp.style.transition='stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)';lp.style.strokeDashoffset=0}catch(e){}
  }else{
    const bW=Math.max(2,Math.min(14,cW/n*0.5));const maxB=Math.max(maxV,1);
    let bars='';xs.forEach((x,i)=>{const h=Math.max(2,pts[i]/maxB*cH);bars+=`<rect x="${(x-bW/2).toFixed(1)}" y="${(PT+cH-h).toFixed(1)}" width="${bW.toFixed(1)}" height="${h.toFixed(1)}" fill="url(#mt6bG)" rx="2" class="mt6mbar" data-y="${(PT+cH-h).toFixed(1)}" data-h="${h.toFixed(1)}" style="transition:y .8s cubic-bezier(.34,1.4,.64,1) ${i*18}ms,height .8s cubic-bezier(.34,1.4,.64,1) ${i*18}ms"/>`});
    mc.innerHTML=bars;md.innerHTML='';
    requestAnimationFrame(()=>document.querySelectorAll('.mt6mbar').forEach(r=>{r.setAttribute('y',r.dataset.y);r.setAttribute('height',r.dataset.h)}));
  }
  const ms=mt6_$('mt6-mainsub');if(ms)ms.textContent=mt6_chartMode==='line'?`${n-1} marco${n-1!==1?'s':''} · ${mt6_totalXP()} XP`:`${n-1} ponto${n-1!==1?'s':''}`;
}
function mt6_setMode(m,btn){mt6_chartMode=m;document.querySelectorAll('.mt6-seg').forEach(b=>b.classList.remove('on'));btn.classList.add('on');mt6_drawMain()}

/* ── HBARS ── */

  const levels=[{l:'Difícil',k:'hard',c:'#E84C6A'},{l:'Média',k:'mid',c:'#F5A623'},{l:'Fácil',k:'easy',c:'#3B82F6'}];

/* ── DONUT ── */
function mt6_drawDonut(){
  const cats=Object.keys(mt6_CAT_COL);const counts=cats.map(c=>mt6_goals.filter(g=>g.cat===c).length);
  const total=counts.reduce((s,v)=>s+v,0)||1;
  const CX=50,CY=50,R=34,SW=13;const circ=2*Math.PI*R;let off=0,paths='';

    paths+=`<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${mt6_CAT_COL[c]}" stroke-width="${SW}" stroke-dasharray="${dash} ${rest}" stroke-dashoffset="${(-off+circ/4).toFixed(2)}" transform="rotate(-90 ${CX} ${CY})" style="transition:stroke-dasharray .9s cubic-bezier(.4,0,.2,1)"/>`;
    off+=circ*a;
  });
  const dg=mt6_$('mt6-dnutg');if(dg)dg.innerHTML=paths;
  const dn=mt6_$('mt6-dnutn');if(dn)dn.textContent=mt6_goals.length;
  const dp=mt6_$('mt6-dnutpill');if(dp)dp.textContent=mt6_doneG().length+' concluídas';

    row.innerHTML=`<div class="mt6-dl-l"><div class="mt6-dl-dot" style="background:${mt6_CAT_COL[c]}"></div><span class="mt6-dl-n">${mt6_CAT_LBL[c]}</span></div><span class="mt6-dl-v">${counts[i]}<span style="color:var(--mt3);font-weight:400"> ${pct}%</span></span>`;
    leg.appendChild(row);
  });

/* ── TREND ── */
function mt6_drawTrend(){
  const tsvg=mt6_$('mt6-trendsvg');if(!tsvg)return;
  const W=tsvg.getBoundingClientRect().width||220;

  tsvg.setAttribute('viewBox',`0 0 ${W} ${H}`);tsvg.style.height=H+'px';
  const now=new Date();const months=[],vals=[];
  for(let m=5;m>=0;m--){
    const d=new Date(now.getFullYear(),now.getMonth()-m,1);months.push(mt6_SMB[d.getMonth()]);
    const s2=new Date(d.getFullYear(),d.getMonth(),1),e2=new Date(d.getFullYear(),d.getMonth()+1,0);
    vals.push(mt6_goals.filter(g=>g.doneAt&&new Date(g.doneAt)>=s2&&new Date(g.doneAt)<=e2).length);
  }

  const tg=mt6_$('mt6-tgrid');if(tg)tg.innerHTML=grid;
  const line=mt6_smth(xs,ys);const area=line+` L${xs[n-1].toFixed(1)},${(PT+cH).toFixed(1)} L${xs[0].toFixed(1)},${(PT+cH).toFixed(1)} Z`;
  const ta=mt6_$('mt6-tarea');if(ta)ta.setAttribute('d',area);
  const tl=mt6_$('mt6-tline');if(tl){tl.setAttribute('d',line);try{const len=tl.getTotalLength()||200;tl.style.strokeDasharray=len;tl.style.strokeDashoffset=len;tl.style.transition='none';void tl.getBoundingClientRect();tl.style.transition='stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)';tl.style.strokeDashoffset=0}catch(e){}}
  const tdg=mt6_$('mt6-tdots');if(tdg){tdg.innerHTML='';xs.forEach((x,i)=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',x.toFixed(1));c.setAttribute('cy',ys[i].toFixed(1));c.setAttribute('r',i===n-1?'4':'2.8');c.setAttribute('fill',i===n-1?'#2EB67D':'#22915F');c.setAttribute('opacity',i===n-1?'1':'.5');tdg.appendChild(c);if(vals[i]>0){const t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',x.toFixed(1));t.setAttribute('y',(ys[i]-6).toFixed(1));t.setAttribute('text-anchor','middle');t.setAttribute('font-family','DM Mono,monospace');t.setAttribute('font-size','8');t.setAttribute('fill','#2EB67D');t.setAttribute('font-weight','600');t.textContent=vals[i];tdg.appendChild(t)}})}
  const tp=mt6_$('mt6-trendpill');if(tp)tp.textContent=vals.reduce((s,v)=>s+v,0)+' no semestre';
  const tlbl=mt6_$('mt6-tlabels');if(tlbl)tlbl.innerHTML=months.map(m=>`<span style="font-family:'DM Mono',monospace;font-size:.5rem;color:var(--mt3);flex:1;text-align:center">${m}</span>`).join('');

/* ── PERIOD BARS ── */
function mt6_drawPeriods(){
  const now=new Date();const y=now.getFullYear(),mo=now.getMonth();
  const fills=['g','a','b','p'];const periods=[];
  for(let off=0;off<4;off++){
    const eM=mo-off*6,sM=eM-5;
    const start=new Date(y,sM,1),end=new Date(y,eM+1,0);
    const lbl=mt6_SMB[((sM%12)+12)%12]+' — '+mt6_SMB[((eM%12)+12)%12];
    const done=mt6_doneG().filter(g=>g.doneAt&&new Date(g.doneAt)>=start&&new Date(g.doneAt)<=end).length;
    periods.push({lbl,done,fi:fills[off]});
  }
  const maxD=Math.max(...periods.map(p=>p.done),1);
  const el=mt6_$('mt6-perrows');if(!el)return;el.innerHTML='';
  periods.forEach(p=>{
    const pct=Math.round(p.done/maxD*100);
    const row=document.createElement('div');row.className='mt6-per-row';
    row.innerHTML=`<div class="mt6-per-lbl">${p.lbl}</div><div class="mt6-per-track"><div class="mt6-per-fill ${p.fi}" style="width:0%" data-w="${pct}"></div></div><div class="mt6-per-val">${p.done}</div>`;
    el.appendChild(row);
  });
  const best=periods.reduce((a,b)=>b.done>a.done?b:a,periods[0]);
  const pp=mt6_$('mt6-perpill');if(pp)pp.textContent='Melhor: '+best.lbl;
  setTimeout(()=>el.querySelectorAll('.mt6-per-fill').forEach(f=>f.style.width=f.dataset.w+'%'),80);
}

/* ── GOALS TABLE ── */
function mt6_renderTable(){
  let list=mt6_visGoals();
  if(mt6_lvFilter!=='all')list=list.filter(g=>g.level===mt6_lvFilter);
  const w={hard:3,mid:2,easy:1};
  list=[...list.filter(g=>!g.done).sort((a,b)=>w[b.level]-w[a.level]),...list.filter(g=>g.done)];
  const tb=mt6_$('mt6-gtbody');if(!tb)return;
  if(!list.length){tb.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--mt3);font-size:.72rem">Nenhuma meta encontrada</td></tr>`;return}
  tb.innerHTML=list.map(g=>{
    const pct=g.done?100:mt6_estProg(g);const fc=mt6_LV_C[g.level];const catCol=mt6_CAT_COL[g.cat]||'#9299B8';
    return`<tr class="${g.done?'mt6-done-row':''}" id="mt6-gr-${g.id}">
      <td><div class="mt6-td-chk" onclick="mt6_toggleGoal(${g.id},event)"><div class="mt6-td-cb ${g.done?'chk':''}" id="mt6-cb-${g.id}"><svg class="mt6-td-ck ${g.done?'chk':''}" id="mt6-ck-${g.id}" viewBox="0 0 9 7"><polyline points="1,3.5 3.5,6 8,1"/></svg></div><span class="mt6-td-nm ${g.done?'chk':''}" id="mt6-nm-${g.id}">${g.name}</span></div></td>
      <td><span class="mt6-lv mt6-lv-${g.level[0]}">${mt6_LV_L[g.level]}</span></td>
      <td><div class="mt6-td-prog"><div class="mt6-td-pt"><div class="mt6-td-pf" id="mt6-pf-${g.id}" style="width:${pct}%;background:${fc}"></div></div><span class="mt6-td-pct" id="mt6-pc-${g.id}">${pct}%</span></div></td>
      <td><span style="font-size:.58rem;color:${catCol};font-weight:700;padding:2px 5px;background:${catCol}20;border-radius:100px">${g.cat}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:.65rem;color:${g.done?'var(--g)':'var(--mt3)'};font-weight:${g.done?'700':'400'}" id="mt6-xp-${g.id}">${g.done?'+'+mt6_XP[g.level]+' XP':'—'}</td>
    </tr>`;
  }).join('');
  const done2=list.filter(g=>g.done).length;

function mt6_toggleGoal(id,ev){
  ev.stopPropagation();
  const g=mt6_goals.find(x=>x.id===id);if(!g)return;
  g.done=!g.done;g.doneAt=g.done?new Date().toISOString():null;
  const _c=id2=>{const el=mt6_$(id2);return el};
  const row=_c(`mt6-gr-${id}`),cb=_c(`mt6-cb-${id}`),ck=_c(`mt6-ck-${id}`);
  const nm=_c(`mt6-nm-${id}`),pf=_c(`mt6-pf-${id}`),pc=_c(`mt6-pc-${id}`),xp=_c(`mt6-xp-${id}`);
  if(row){row.classList.toggle('mt6-done-row',g.done);row.style.transition='transform .22s cubic-bezier(.34,1.4,.64,1)';row.style.transform='scale(1.01)';setTimeout(()=>{if(row)row.style.transform=''},200)}
  if(cb)cb.classList.toggle('chk',g.done);if(ck)ck.classList.toggle('chk',g.done);if(nm)nm.classList.toggle('chk',g.done);
  const pct=g.done?100:mt6_estProg(g);
  if(pf)pf.style.width=pct+'%';if(pc)pc.textContent=pct+'%';
  if(xp){xp.textContent=g.done?'+'+mt6_XP[g.level]+' XP':'—';xp.style.color=g.done?'var(--g)':'var(--mt3)';xp.style.fontWeight=g.done?'700':'400'}
  if(g.done){const last=mt6_hist[mt6_hist.length-1]||0;mt6_hist.push(last+mt6_XP[g.level]);mt6_pushFeed(g)}
  else if(mt6_hist.length>1)mt6_hist.pop();
  mt6_save();mt6_toast(g.done?`✦ "${g.name}" concluída! +${mt6_XP[g.level]} XP`:`↩ "${g.name}" reaberta`);
  mt6_updateKPI();mt6_drawMain();mt6_drawHBars();mt6_drawDonut();mt6_drawTrend();mt6_drawPeriods();mt6_renderCal();
  const d2=mt6_goals.filter(x=>x.done).length,t2=mt6_visGoals().length;
  const ls=mt6_$('mt6-listsub');if(ls)ls.textContent=`${t2-d2} pendentes · ${d2} concluídas`;
}

function mt6_initFeed(){
  mt6_feedItems=mt6_doneG().sort((a,b)=>new Date(b.doneAt)-new Date(a.doneAt)).slice(0,5)
    .map((g,i)=>({g,ago:['agora mesmo','há 2min','há 5min','há 12min','há 25min'][i]||'antes'}));
  mt6_renderFeed();
}
function mt6_pushFeed(g){
  mt6_feedItems.unshift({g,ago:'agora mesmo'});
  const times=['agora mesmo','há 1min','há 4min','há 8min','há 18min'];
  mt6_feedItems=mt6_feedItems.slice(0,5).map((it,i)=>({...it,ago:times[i]||'antes'}));

}
function mt6_renderFeed(){
  const el=mt6_$('mt6-feed');if(!el)return;

  el.innerHTML=mt6_feedItems.map(it=>{
    const g=it.g;const col=mt6_LV_C[g.level];const msg=msgs[Math.floor(Math.random()*msgs.length)](g);
    return`<div class="mt6-feed-item"><div class="mt6-fd" style="background:${col}"></div><div class="mt6-ft">${msg}</div><span class="mt6-fx ${g.level}">+${mt6_XP[g.level]}xp</span><span class="mt6-ftm">${it.ago}</span></div>`;

/* ── SIMULATION ── */
function mt6_startSim(){
  if(mt6_simTimer)return;
  function tick(){
    const pending=mt6_goals.filter(g=>!g.done);
    if(!pending.length){clearInterval(mt6_simTimer);mt6_simTimer=null;return}
    if(Math.random()<0.28){
      const g=pending[Math.floor(Math.random()*pending.length)];
      g.done=true;g.doneAt=new Date().toISOString();
      const last=mt6_hist[mt6_hist.length-1]||0;mt6_hist.push(last+mt6_XP[g.level]);
      mt6_save();mt6_pushFeed(g);
      const cb=mt6_$(`mt6-cb-${g.id}`),ck=mt6_$(`mt6-ck-${g.id}`),nm=mt6_$(`mt6-nm-${g.id}`);
      const pf=mt6_$(`mt6-pf-${g.id}`),pc=mt6_$(`mt6-pc-${g.id}`),xp=mt6_$(`mt6-xp-${g.id}`);
      const row=mt6_$(`mt6-gr-${g.id}`);
      if(row)row.classList.add('mt6-done-row');if(cb)cb.classList.add('chk');if(ck)ck.classList.add('chk');
      if(nm)nm.classList.add('chk');if(pf)pf.style.width='100%';if(pc)pc.textContent='100%';
      if(xp){xp.textContent='+'+mt6_XP[g.level]+' XP';xp.style.color='var(--g)';xp.style.fontWeight='700'}
      mt6_updateKPI();mt6_drawMain();mt6_drawHBars();mt6_drawDonut();mt6_drawTrend();mt6_drawPeriods();mt6_renderCal();
      mt6_toast(`🤖 "${g.name}" +${mt6_XP[g.level]} XP`);
    }
  }
  mt6_simTimer=setInterval(tick,9000+Math.random()*5000);
}

/* ── CALENDAR ── */
function mt6_renderCal(){
  const el=mt6_$('mt6-caldays');if(!el)return;
  const ml=mt6_$('mt6-calm');if(ml)ml.textContent=mt6_MBR[mt6_calM]+' '+mt6_calY;
  el.innerHTML='';
  const first=new Date(mt6_calY,mt6_calM,1).getDay();const total=new Date(mt6_calY,mt6_calM+1,0).getDate();
  const now=new Date();const todayS=now.toDateString();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='mt6-cal-day empty';el.appendChild(e)}
  for(let d=1;d<=total;d++){
    const dt=new Date(mt6_calY,mt6_calM,d);const ds=dt.toDateString();const fut=dt>now&&ds!==todayS;
    const dG=mt6_goals.filter(g=>g.doneAt&&new Date(g.doneAt).toDateString()===ds);
    const div=document.createElement('div');
    div.className='mt6-cal-day'+(ds===todayS?' today':'')+(dG.length?' has':'')+(fut?' fut':'');
    if(mt6_selCalDay&&new Date(mt6_selCalDay).toDateString()===ds)div.classList.add('sel');
    div.textContent=d;
    if(!fut)div.addEventListener('click',()=>{mt6_selCalDay=dt.toISOString();mt6_renderCal();mt6_showCalDet(dt,dG)});
    el.appendChild(div);
  }
}
function mt6_showCalDet(dt,dG){
  const el=mt6_$('mt6-caldet'),ti=mt6_$('mt6-cdt'),it=mt6_$('mt6-cdi');
  if(!el||!ti||!it)return;
  ti.textContent=dt.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  it.innerHTML=dG.length?dG.map(g=>`<div class="mt6-cd-i"><div class="mt6-cd-d" style="background:${mt6_LV_C[g.level]}"></div>${g.name}</div>`).join(''):`<div class="mt6-cd-i" style="color:var(--mt3)">Nenhuma meta neste dia.</div>`;
  el.classList.add('show');
}

function exportLifeOSPdf(){
  const win = window.open('', '_blank', 'width=1200,height=900');

  /* Copia todos os estilos da página */
  const styles = Array.from(document.querySelectorAll('style,link[rel="stylesheet"]'))
    .map(el=>el.outerHTML).join('\n');

  const tmp = document.createElement('div');
  renderLifeosDash(tmp);

/* ── STATE ── */
let fiPlan=null, fiStep=0, fiView='month';
const fiSTS={ok:['#e8f8f5','#2EC4B6','Em dia'],meta:['#eef2ff','#4361EE','Meta ✓'],warn:['#fff8ee','#FF8C42','Atenção']};

function fiR(n,d=0){return`R$ ${n.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d})}`}
function fi$(id){return document.getElementById(id)}

let fiTT;
function fiToast(m,dur=2400){
  const t=fi$('fi-toast');if(!t)return;
  t.textContent=m;t.classList.add('show');
  clearTimeout(fiTT);fiTT=setTimeout(()=>t.classList.remove('show'),dur);
}

/* ── MODAL ── */
function fiOpenModal(){fiStep=0;fiStepSync();const ov=fi$('fi-ov');if(ov)ov.classList.add('open')}
function fiCloseModal(){const ov=fi$('fi-ov');if(ov)ov.classList.remove('open')}

function fiStepSync(){
  ['fi-p0','fi-p1','fi-p2'].forEach((id,i)=>{const el=fi$(id);if(el)el.classList.toggle('active',i===fiStep)});
  for(let i=0;i<3;i++){
    const l=fi$(`fi-sl${i}`);const sep=i<2?fi$(`fi-ss${i}`):null;
    if(l)l.className='fi-si'+(i<fiStep?' done':i===fiStep?' active':'');
    if(sep)sep.className='fi-ssep'+(i<fiStep?' done':'');
  }
  const bb=fi$('fi-bBack');if(bb)bb.style.display=fiStep>0?'':'none';
  const bn=fi$('fi-bNext');if(bn)bn.textContent=fiStep===2?'✦ Gerar Plano':'Próximo →';
}

function fiValid(){
  if(fiStep===0){
    if(!fi$('fi-fi')?.value||+fi$('fi-fi').value<=0){fiToast('Informe sua renda mensal');return false}
    if(!fi$('fi-fe')?.value||+fi$('fi-fe').value<0){fiToast('Informe seus gastos mensais');return false}
    return true;
  }
  if(fiStep===1){
    if(!fi$('fi-fgt')?.value){fiToast('Selecione seu objetivo');return false}
    if(!fi$('fi-fga')?.value||+fi$('fi-fga').value<=0){fiToast('Informe o valor da meta');return false}
    if(!fi$('fi-fm')?.value||+fi$('fi-fm').value<1){fiToast('Informe o prazo em meses');return false}
    return true;
  }
  return true;
}

/* ── GENERATE ── */
function fiGen(){
  const inc=+fi$('fi-fi')?.value||0;
  const exp=+fi$('fi-fe')?.value||0;
  const sav=+fi$('fi-fs')?.value||0;
  const gAmt=+fi$('fi-fga')?.value||0;
  const mo=Math.max(1,+fi$('fi-fm')?.value||12);
  const smIn=+fi$('fi-fsm')?.value||0;
  const debt=fi$('fi-fd')?.value||'nao';
  const disc=fi$('fi-fdisc')?.value||'medio';
  const inv=fi$('fi-finv')?.value||'nao';
  const food=+fi$('fi-ffood')?.value||0;
  const gt=fi$('fi-fgt')?.value||'outro';

  const surplus=inc-exp;
  const canSave=Math.max(0,surplus);
  const saveM=smIn>0?Math.min(smIn,canSave):canSave;
  const saveD=saveM/30;
  const projFull=sav+saveM*mo;
  const rem=Math.max(0,gAmt-sav);
  const mNeeded=saveM>0?Math.ceil(rem/saveM):Infinity;
  const gPct=gAmt>0?Math.min(100,Math.round(sav/gAmt*100)):0;
  const sr=inc>0?saveM/inc:0;

  let sc=0;
  if(sr>=.3)sc+=35;else if(sr>=.15)sc+=22;else if(sr>0)sc+=10;
  if(debt==='nao')sc+=25;else if(debt==='pequena')sc+=15;else if(debt==='media')sc+=8;
  if(disc==='alto')sc+=20;else if(disc==='medio')sc+=12;
  if(inv!=='nao')sc+=20;
  sc=Math.min(100,sc);

  const lev=sc>=80?'Mestre':sc>=65?'Avançado':sc>=45?'Em Evolução':sc>=25?'Construindo':'Iniciante';
  const gL={reserva:'Reserva',viagem:'Viagem',investimento:'Investimento',divida:'Quitar Dívidas',imovel:'Imóvel',outro:'Meu Objetivo'}[gt]||'Objetivo';

  const MB=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const now=new Date();
  const fc=[];
  for(let i=0;i<=Math.min(mo,24);i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    fc.push({month:`${MB[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`,income:inc,expenses:exp,save:saveM,balance:sav+saveM*i,target:gAmt||null});
  }

  const expF=exp||1;
  const cats=[
    {l:'Alimentação',v:food||Math.round(expF*.28),c:'#4361EE'},
    {l:'Moradia',    v:Math.round(expF*.32),       c:'#7B2FBE'},
    {l:'Transporte', v:Math.round(expF*.15),       c:'#F72585'},
    {l:'Outros',     v:Math.round(expF*.25),       c:'#4CC9F0'},
  ].filter(c=>c.v>0);

  fiPlan={inc,exp,sav,gAmt,mo,saveM,saveD,projFull,rem,mNeeded,gPct,sr,sc,lev,gL,fc,cats,surplus};
  fiUpdateKPI();fiDrawBar();fiDrawDonut();fiDrawLine();fiFillTable(fiPlan.fc);fiUpdateCTA();
  fiToast('✦ Plano gerado com sucesso!',3000);
  try{if(window.storage&&fiPlan)window.storage.set('fi3:plan',JSON.stringify(fiPlan))}catch(e){}
}

/* ── UPDATE KPI ── */
function fiUpdateKPI(){
  const p=fiPlan;
  const set=(id,v,d,w)=>{
    const ve=fi$(id);if(ve)ve.textContent=v;
    const de=fi$(id+'d');if(de)de.textContent=d;
    const be=fi$(id+'b');if(be)be.style.width=w;
  };
  set('fi-k-income',fiR(p.inc),fiR(p.exp)+' em gastos','100%');
  set('fi-k-save',fiR(p.saveM),Math.round(p.sr*100)+'% da renda',Math.min(p.sr*250,100)+'%');
  set('fi-k-exp',fiR(p.exp),'despesas mensais',p.inc>0?Math.min(p.exp/p.inc*100,100)+'%':'50%');
  set('fi-k-goal',fiR(p.gAmt),p.mNeeded===Infinity?'Reveja o plano':p.mNeeded+' meses',p.gPct+'%');
  set('fi-k-score',p.sc+'%',p.lev,p.sc+'%');
}
function fiUpdateCTA(){
  const p=fiPlan;
  const t=fi$('fi-ctaTitle');if(t)t.textContent=`Plano: ${p.gL} · Score ${p.sc}% — ${p.lev}`;
  const s=fi$('fi-ctaSub');if(s)s.textContent=`Guardando ${fiR(p.saveM)}/mês · Meta em ${p.mNeeded===Infinity?'∞':p.mNeeded} meses · Patrimônio ${fiR(p.projFull)}`;
}

/* ── BAR CHART ── */
function fiSetView(v,el){fiView=v;document.querySelectorAll('.fi-sp').forEach(s=>s.classList.remove('on'));if(el)el.classList.add('on');if(fiPlan)fiDrawBar()}

function fiDrawBar(){
  const p=fiPlan;
  const W=680,H=185,PL=38,PR=10,PT=12,PB=22,cW=W-PL-PR,cH=H-PT-PB;
  let data=p.fc.slice(0,fiView==='month'?12:fiView==='quarter'?12:p.fc.length);
  const stepN=fiView==='quarter'?3:1;
  let agg=[];
  for(let i=0;i<data.length;i+=stepN){
    const ch=data.slice(i,i+stepN);
    agg.push({l:ch[0].month,a:ch.reduce((s,c)=>s+c.income,0)/ch.length,b:ch.reduce((s,c)=>s+c.expenses,0)/ch.length,c:ch.reduce((s,c)=>s+c.save,0)/ch.length});
  }
  const n=agg.length;if(!n)return;
  const mxV=Math.max(...agg.map(d=>Math.max(d.a,d.b,d.c)))*1.18||1;
  const gW=cW/n;
  const bW=Math.max(4,Math.min(13,gW*.22));
  const gap=bW*.28;
  let out='',bars='',xlbls='';
  [0,.25,.5,.75,1].forEach(f=>{
    const yy=(PT+cH-f*cH).toFixed(1);
    const v=mxV*f;
    out+=`<line x1="${PL}" y1="${yy}" x2="${W-PR}" y2="${yy}" stroke="#EEF1F8" stroke-width="1"/>`;
    out+=`<text x="${PL-4}" y="${(PT+cH-f*cH+3).toFixed(1)}" font-family="DM Mono,monospace" font-size="7.5" fill="#9AA4BE" text-anchor="end">${v>=1000?Math.round(v/1000)+'k':Math.round(v)}</text>`;
  });
  agg.forEach((d,i)=>{
    const cx=(PL+i*gW+gW/2).toFixed(1);
    const x1=(+cx-bW-gap-bW/2).toFixed(1),x2=(+cx-bW/2).toFixed(1),x3=(+cx+gap+bW/2).toFixed(1);
    const bh1=Math.max(2,d.a/mxV*cH),bh2=Math.max(2,d.b/mxV*cH),bh3=Math.max(2,d.c/mxV*cH);
    const y1=(PT+cH-bh1).toFixed(1),y2=(PT+cH-bh2).toFixed(1),y3=(PT+cH-bh3).toFixed(1);
    const dl=i*32;
    bars+=`<rect x="${x1}" y="${H}" width="${bW}" height="0" fill="url(#fibG1)" rx="3" class="fi-abar" data-y="${y1}" data-h="${bh1.toFixed(1)}" style="transition:y .8s cubic-bezier(.34,1.4,.64,1) ${dl}ms,height .8s cubic-bezier(.34,1.4,.64,1) ${dl}ms"/>`;
    bars+=`<rect x="${x2}" y="${H}" width="${bW}" height="0" fill="url(#fibG2)" rx="3" class="fi-abar" data-y="${y2}" data-h="${bh2.toFixed(1)}" style="transition:y .8s cubic-bezier(.34,1.4,.64,1) ${dl+10}ms,height .8s cubic-bezier(.34,1.4,.64,1) ${dl+10}ms"/>`;
    bars+=`<rect x="${x3}" y="${H}" width="${bW}" height="0" fill="url(#fibG3)" rx="3" class="fi-abar" data-y="${y3}" data-h="${bh3.toFixed(1)}" style="transition:y .8s cubic-bezier(.34,1.4,.64,1) ${dl+20}ms,height .8s cubic-bezier(.34,1.4,.64,1) ${dl+20}ms"/>`;
    if(i%Math.max(1,Math.ceil(n/10))===0||i===n-1)
      xlbls+=`<text x="${cx}" y="${H-3}" font-family="DM Mono,monospace" font-size="7.5" fill="#9AA4BE" text-anchor="middle">${d.l}</text>`;
  });
  const bw=fi$('fi-barWrap');if(!bw)return;
  bw.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;overflow:visible">
    <defs>
      <linearGradient id="fibG1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4361EE"/><stop offset="100%" stop-color="#7B2FBE"/></linearGradient>
      <linearGradient id="fibG2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F72585"/><stop offset="100%" stop-color="#7B2FBE"/></linearGradient>
      <linearGradient id="fibG3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4CC9F0"/><stop offset="100%" stop-color="#4361EE"/></linearGradient>
    </defs>
    ${out}${bars}${xlbls}</svg>`;
  const bs=fi$('fi-barSub');if(bs)bs.textContent=`${n} ${fiView==='month'?'meses':'períodos'} · Projeção personalizada`;
  requestAnimationFrame(()=>document.querySelectorAll('.fi-abar').forEach(r=>{r.setAttribute('y',r.dataset.y);r.setAttribute('height',r.dataset.h)}));
}

/* ── DONUT ── */
function fiDrawDonut(){
  const p=fiPlan;
  const CX=60,CY=60,R=40,SW=17;
  const circ=2*Math.PI*R;
  const total=p.cats.reduce((s,c)=>s+c.v,0)||1;
  let off=0,paths='';
  p.cats.forEach(c=>{
    const a=c.v/total;const dash=(circ*a).toFixed(2);const rest=(circ-circ*a).toFixed(2);
    paths+=`<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${c.c}" stroke-width="${SW}" stroke-dasharray="${dash} ${rest}" stroke-dashoffset="${(-off+circ/4).toFixed(2)}" transform="rotate(-90 ${CX} ${CY})" style="transition:stroke-dasharray .9s cubic-bezier(.4,0,.2,1)"/>`;
    off+=circ*a;
  });
  const dg=fi$('fi-donutG');if(dg)dg.innerHTML=paths;
  const dc=fi$('fi-dCenter');if(dc)dc.textContent=fiR(total);
  const dl=fi$('fi-dLbl');if(dl)dl.textContent='GASTOS';
  const db=fi$('fi-donutBadge');if(db)db.textContent=fiR(p.exp)+'/mês';
  const leg=fi$('fi-dLegend');if(!leg)return;
  const hdr=leg.firstElementChild;leg.innerHTML='';if(hdr)leg.appendChild(hdr);
  p.cats.forEach(c=>{
    const pct=Math.round(c.v/total*100);
    const row=document.createElement('div');row.className='fi-dl';
    row.innerHTML=`<div class="fi-dl-l"><div class="fi-dl-d" style="background:${c.c}"></div><span class="fi-dl-n">${c.l}</span></div>
      <div style="display:flex;align-items:center;gap:4px"><span class="fi-dl-v">${fiR(c.v)}</span><span class="fi-dl-p">${pct}%</span></div>`;
    leg.appendChild(row);
  });
}

/* ── LINE CHART ── */
function fiDrawLine(){
  const p=fiPlan;
  const W=500,H=155,PL=38,PR=12,PT=12,PB=20,cW=W-PL-PR,cH=H-PT-PB;
  const data=p.fc;const n=data.length;
  const mxV=Math.max(...data.map(d=>d.balance),p.gAmt||0)*1.15||1;
  const xs=data.map((_,i)=>PL+i/Math.max(n-1,1)*cW);
  const ys=data.map(d=>PT+cH-(d.balance/mxV)*cH);
  let lineD=`M${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
  for(let i=1;i<n;i++){const cx=(xs[i-1]+xs[i])/2;lineD+=` C${cx.toFixed(1)},${ys[i-1].toFixed(1)} ${cx.toFixed(1)},${ys[i].toFixed(1)} ${xs[i].toFixed(1)},${ys[i].toFixed(1)}`}
  const areaD=lineD+` L${xs[n-1].toFixed(1)},${(PT+cH).toFixed(1)} L${xs[0].toFixed(1)},${(PT+cH).toFixed(1)} Z`;
  let grid='',ylbls='',xlbls='',goal='';
  [0,.5,1].forEach(f=>{
    const yy=(PT+cH-f*cH).toFixed(1);const v=mxV*f;
    grid+=`<line x1="${PL}" y1="${yy}" x2="${W-PR}" y2="${yy}" stroke="#EEF1F8" stroke-width="1"/>`;
    ylbls+=`<text x="${PL-4}" y="${(+yy+3).toFixed(1)}" font-family="DM Mono,monospace" font-size="7.5" fill="#9AA4BE" text-anchor="end">${v>=1000?Math.round(v/1000)+'k':Math.round(v)}</text>`;
  });
  data.forEach((d,i)=>{if(i%Math.max(1,Math.ceil(n/6))===0||i===n-1)xlbls+=`<text x="${xs[i].toFixed(1)}" y="${H-4}" font-family="DM Mono,monospace" font-size="7.5" fill="#9AA4BE" text-anchor="middle">${d.month}</text>`});
  if(p.gAmt>0){const gy=(PT+cH-(p.gAmt/mxV)*cH).toFixed(1);let gD=`M${xs[0].toFixed(1)},${gy}`;xs.slice(1).forEach(x=>{gD+=` L${x.toFixed(1)},${gy}`});goal=`<path d="${gD}" fill="none" stroke="#2EC4B6" stroke-width="1.5" stroke-dasharray="5,4" opacity=".65"/>`}
  const lw=fi$('fi-lineWrap');if(!lw)return;
  lw.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;overflow:visible">
    <defs>
      <linearGradient id="filaG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4361EE" stop-opacity=".15"/><stop offset="100%" stop-color="#4361EE" stop-opacity="0"/></linearGradient>
      <filter id="filglow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    ${grid}${ylbls}
    <path d="${areaD}" fill="url(#filaG)"/>
    <path d="${lineD}" fill="none" stroke="#4361EE" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#filglow)"/>
    ${goal}${xlbls}
    <circle cx="${xs[n-1].toFixed(1)}" cy="${ys[n-1].toFixed(1)}" r="5" fill="#4361EE" stroke="#fff" stroke-width="2" filter="url(#filglow)"/></svg>`;
  const lb=fi$('fi-lineBadge');if(lb)lb.textContent=fiR(p.projFull);
}

/* ── TABLE ── */
function fiRowSt(r){if(r.target&&r.balance>=r.target)return'meta';if(r.save>=r.income*.1)return'ok';return r.save>0?'ok':'warn'}
function fiFillTable(data){
  const tb=fi$('fi-tbody');if(!tb)return;
  tb.innerHTML=data.map(r=>{
    const[bg,col,lbl]=fiSTS[fiRowSt(r)];
    return`<tr>
      <td style="font-weight:600">${r.month}</td>
      <td class="m">${fiR(r.income)}</td>
      <td class="m">${fiR(r.expenses)}</td>
      <td class="m" style="color:#2EC4B6;font-weight:600">+${fiR(r.save)}</td>
      <td class="m" style="font-weight:700;color:#4361EE">${fiR(r.balance)}</td>
      <td><span class="fi-bdg" style="background:${bg};color:${col}">${lbl}</span></td>
    </tr>`;
  }).join('');
  const ti=fi$('fi-tblInfo');if(ti)ti.textContent=`${data.length} registro${data.length!==1?'s':''}`;
  const tot=Math.ceil(data.length/6);
  const pg=fi$('fi-pages');if(pg)pg.innerHTML=[...Array(Math.min(tot,4))].map((_,i)=>
    `<button class="fi-pg ${i===0?'on':''}" onclick="document.querySelectorAll('.fi-pg').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${i+1}</button>`
  ).join('')+(tot>4?`<button class="fi-pg">›</button>`:'');
}

  fi$('fi-ov')?.addEventListener('click',e=>{if(e.target===fi$('fi-ov'))fiCloseModal()});
  fi$('fi-tblSrch')?.addEventListener('input',function(){if(fiPlan)fiFillTable(fiPlan.fc.filter(r=>r.month.toLowerCase().includes(this.value.toLowerCase())))});

  /* restore plan if exists */
  try{
    if(window.storage){
      const r=await window.storage.get('fi3:plan');
      if(r?.value){fiPlan=JSON.parse(r.value);fiUpdateKPI();fiDrawBar();fiDrawDonut();fiDrawLine();fiFillTable(fiPlan.fc);fiUpdateCTA()}
    }
  }catch(e){}

  /* resize handler */
  if(!window._fiRsz){
    window._fiRsz=true;
    let _rt;window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{if(fiPlan&&activeModule==='financas'){fiDrawBar();fiDrawLine()}},180)});
  }
}

/* ── Energia Mental JS ─────────────────────────────────── */
const EM_DIAS   = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
const EM_CURTOS = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const EM_FOCO_L = ['','Muito Baixo','Baixo','Regular','Bom','Ótimo'];

let emWeekData = [
  {dormiu:'23:30',acordou:'06:30',foco:3,energia:60},
  {dormiu:'00:00',acordou:'07:00',foco:3,energia:55},
  {dormiu:'23:00',acordou:'06:30',foco:4,energia:65},
  {dormiu:'22:30',acordou:'06:00',foco:4,energia:70},
  {dormiu:'23:00',acordou:'06:30',foco:5,energia:82},
  {dormiu:'00:30',acordou:'08:00',foco:3,energia:60},
  {dormiu:'01:00',acordou:'09:00',foco:2,energia:50},
];

let emDur=30*60, emRem=30*60, emRunning=false, emIvl=null;
let emSessions=[], emTotalMin=0, emStreak=0;
const EM_CIRC = 2 * Math.PI * 76; // ~477.5

function emSonoH(d,a){
  const [dh,dm]=d.split(':').map(Number);
  const [ah,am]=a.split(':').map(Number);
  let diff=(ah*60+am)-(dh*60+dm);
  if(diff<0)diff+=1440;
  return Math.round(diff/6)/10;
}

function emFlash(id,val){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=val;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),1000);
}

function emGoTab(t){
  document.querySelectorAll('.em-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.em-tab').forEach(x=>x.classList.remove('active'));
  const pg=document.getElementById('em-page-'+t);
  const tb=document.getElementById('em-tab-'+t);
  if(pg)pg.classList.add('active');
  if(tb)tb.classList.add('active');
}

function emBuildTable(){
  const tb=document.getElementById('em-weekTbody');
  if(!tb)return;
  tb.innerHTML='';
  emWeekData.forEach((d,i)=>{
    const h=emSonoH(d.dormiu,d.acordou);
    const bc=d.energia>=70?'em-ba':d.energia>=50?'em-bm':'em-bb';
    const tr=document.createElement('tr');
    if(i===4)tr.classList.add('em-today');
    tr.innerHTML=`
      <td>${EM_DIAS[i]}${i===4?'<span class="em-today-tag">HOJE</span>':''}</td>
      <td><input class="em-td-time" type="time" value="${d.dormiu}" onchange="emUpdCell(${i},'dormiu',this.value)"></td>
      <td><input class="em-td-time" type="time" value="${d.acordou}" onchange="emUpdCell(${i},'acordou',this.value)"></td>
      <td>${h.toFixed(1)}h</td>
      <td><select class="em-td-sel" onchange="emUpdCell(${i},'foco',+this.value)">${[1,2,3,4,5].map(v=>`<option value="${v}"${d.foco===v?' selected':''}>${EM_FOCO_L[v]}</option>`).join('')}</select></td>
      <td><span class="em-badge ${bc}">${d.energia}%</span><input class="em-td-num" type="number" min="0" max="100" value="${d.energia}" onchange="emUpdCell(${i},'energia',+this.value)"></td>`;
    tb.appendChild(tr);
  });
}

function emUpdCell(i,k,v){emWeekData[i][k]=v;emBuildTable();}

function emCalcular(){
  const avgE=Math.round(emWeekData.reduce((a,d)=>a+d.energia,0)/7);
  const avgF=emWeekData.reduce((a,d)=>a+d.foco,0)/7;
  const avgS=emWeekData.reduce((a,d)=>a+emSonoH(d.dormiu,d.acordou),0)/7;
  emFlash('em-kpiE',avgE+'%');
  emFlash('em-kpiF',EM_FOCO_L[Math.round(avgF)]);
  emFlash('em-kpiS',avgS.toFixed(1)+'h');
  emFlash('em-kpiD',emWeekData.filter(d=>d.energia>0).length+'/7');
  emUpdateSonoOntem();
  // Donut
  const C=238.8;
  const pe=avgE/100,pf=avgF/5*0.6,ps=avgS/9*0.4,tot=pe+pf+ps;
  const pp=[pe/tot,pf/tot,ps/tot];
  const offs=[0,-(pp[0]*C),-((pp[0]+pp[1])*C)];
  ['em-d1','em-d2','em-d3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.style.strokeDashoffset=offs[i];
    el.setAttribute('stroke-dasharray',`${pp[i]*C} ${C}`);
  });
  const score=Math.min(Math.round(avgE*0.5+avgF/5*100*0.3+avgS/9*100*0.2),100);
  const dv=document.getElementById('em-donutV');if(dv)dv.textContent=score;
  const d1=document.getElementById('em-dl1');if(d1)d1.textContent=`Energia ${Math.round(pp[0]*100)}%`;
  const d2=document.getElementById('em-dl2');if(d2)d2.textContent=`Foco ${Math.round(pp[1]*100)}%`;
  const d3=document.getElementById('em-dl3');if(d3)d3.textContent=`Sono ${Math.round(pp[2]*100)}%`;
  // Bar
  emBuildBar();
  // Suggestion
  const sb=document.getElementById('em-suggestion');
  if(sb){
    let msg='';
    if(avgE>=70&&avgS>=7) msg=`Semana <strong>sólida</strong>! Energia média de <strong>${avgE}%</strong> e sono de <strong>${avgS.toFixed(1)}h</strong>. Pico tende a ocorrer entre <strong>19h–22h</strong>.`;
    else if(avgE>=55) msg=`Energia moderada em <strong>${avgE}%</strong>. Com <strong>${avgS.toFixed(1)}h</strong> de sono médio, pequenos ajustes na rotina noturna podem elevar sua performance.`;
    else msg=`Energia abaixo do ideal em <strong>${avgE}%</strong>. Priorize <strong>dormir antes das 23h</strong> para recuperar sua performance.`;
    sb.innerHTML=`<p>${msg}</p>`;
  }
}

function emUpdateSonoOntem(){
  const d=document.getElementById('em-hDormiu');
  const a=document.getElementById('em-hAcordou');
  const q=document.getElementById('em-qualSono');
  const e=document.getElementById('em-energAcor');
  if(!d||!a||!q||!e)return;
  const h=emSonoH(d.value,a.value);
  emFlash('em-kpiO',h.toFixed(1)+'h');
  const em=['','Muito cansado','Cansado','Normal','Bem disposto','Cheio de energia'];
  const qm={ótima:'excelente',boa:'boa',regular:'regular',ruim:'ruim'};
  let msg='';
  if(h>=7.5) msg=`Dormiu <strong>${h.toFixed(1)}h</strong> com qualidade <strong>${qm[q.value]}</strong>. ${em[+e.value]}. Ótima base para performance hoje!`;
  else if(h>=6) msg=`Dormiu <strong>${h.toFixed(1)}h</strong> — abaixo do ideal. ${em[+e.value]}. Considere uma pausa de 20 min no dia.`;
  else msg=`Dormiu apenas <strong>${h.toFixed(1)}h</strong>. ${em[+e.value]}. Priorize tarefas leves hoje.`;
  const sp=document.getElementById('em-sonoPrev');
  if(sp)sp.innerHTML=`<p>${msg}</p>`;
}

function emBuildBar(){
  const area=document.getElementById('em-barChart');
  if(!area)return;
  area.innerHTML='';
  emWeekData.forEach((d,i)=>{
    const sn=Math.min(emSonoH(d.dormiu,d.acordou)/9,1)*100;
    const fn=(d.foco/5)*100;
    const g=document.createElement('div');g.className='em-bar-g';
    const st=document.createElement('div');st.className='em-bar-stack';
    [{cls:'em-bs-s',v:sn},{cls:'em-bs-f',v:fn},{cls:'em-bs-e',v:d.energia}].forEach(s=>{
      const el=document.createElement('div');el.className='em-bar-s '+s.cls;
      const h=Math.round((s.v/100)*100*0.32);
      st.appendChild(el);
      setTimeout(()=>{el.style.transitionDelay=(i*50)+'ms';el.style.height=h+'px';},100);
    });
    const lb=document.createElement('div');lb.className='em-bar-lbl';lb.textContent=EM_CURTOS[i];
    g.appendChild(st);g.appendChild(lb);area.appendChild(g);
  });
}

function emBuildTimeGrid(){
  const grid=document.getElementById('em-timeGrid');
  if(!grid)return;
  grid.innerHTML='';
  const slots=[
    {l:'6h',v:30,c:'#e2e5f0'},{l:'10h',v:55,c:'#c7d0fd'},
    {l:'14h',v:42,c:'#dce0fd'},{l:'17h',v:62,c:'#b3bcfc'},
    {l:'19h',v:90,c:'linear-gradient(180deg,#5b6cf9,#7c3aed)'},
    {l:'22h',v:72,c:'linear-gradient(180deg,#818cf8,#a78bfa)'},
  ];
  slots.forEach((s,i)=>{
    const slot=document.createElement('div');slot.className='em-time-slot';
    const block=document.createElement('div');block.className='em-time-block';
    const fill=document.createElement('div');fill.className='em-time-fill';
    fill.style.background=s.c;fill.style.transitionDelay=(i*80)+'ms';
    if(s.v>70)fill.style.boxShadow='0 -2px 8px rgba(91,108,249,.3)';
    block.appendChild(fill);
    const lb=document.createElement('div');lb.className='em-time-lbl';lb.textContent=s.l;
    slot.appendChild(block);slot.appendChild(lb);grid.appendChild(slot);
    setTimeout(()=>{fill.style.height=s.v+'%';},400+i*80);
  });
}

function emSetDur(m,el){
  if(emRunning)return;
  document.querySelectorAll('.em-dur-pill').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');
  emDur=m*60;emRem=m*60;
}

function emConfirmTask(){
  const task=document.getElementById('em-taskInp');
  if(!task)return;
  if(!task.value.trim()){
    task.style.borderColor='#ef4444';
    task.focus();
    setTimeout(()=>task.style.borderColor='',1000);
    return;
  }
  const tn=document.getElementById('em-taskName');if(tn)tn.textContent=task.value.trim();
  const sel=document.querySelector('.em-dur-pill.sel');
  const db=document.getElementById('em-durBadge');if(db)db.textContent='Sessão de '+(sel?sel.textContent:emDur/60+' min');
  document.getElementById('em-step1').classList.remove('active');
  document.getElementById('em-step2').classList.add('active');
  emRem=emDur;emUpdateRing();
}

function emToggleTimer(){if(emRunning)emPauseTimer();else emStartTimer();}

function emStartTimer(){
  emRunning=true;
  const btn=document.getElementById('em-btnTimer');if(btn){btn.textContent='⏸ Pausar';btn.className='em-tbtn em-tbtn-pause';}
  const dot=document.getElementById('em-tdot');if(dot)dot.className='em-tdot run';
  const sub=document.getElementById('em-ringSub');if(sub)sub.textContent='focando';
  emIvl=setInterval(()=>{emRem--;emUpdateRing();if(emRem<=0)emFinishTimer();},1000);
}

function emPauseTimer(){
  emRunning=false;clearInterval(emIvl);
  const btn=document.getElementById('em-btnTimer');if(btn){btn.textContent='▶ Continuar';btn.className='em-tbtn em-tbtn-start';}
  const dot=document.getElementById('em-tdot');if(dot)dot.className='em-tdot';
  const sub=document.getElementById('em-ringSub');if(sub)sub.textContent='pausado';
}

function emResetTimer(){
  if(emRunning&&emRem<emDur)emSaveSession(false);
  emRunning=false;clearInterval(emIvl);emRem=emDur;
  const btn=document.getElementById('em-btnTimer');if(btn){btn.textContent='▶ Iniciar';btn.className='em-tbtn em-tbtn-start';}
  const dot=document.getElementById('em-tdot');if(dot)dot.className='em-tdot';
  const sub=document.getElementById('em-ringSub');if(sub)sub.textContent='pronto';
  const db=document.getElementById('em-doneBox');if(db)db.classList.remove('vis');
  emUpdateRing();
}

function emFinishTimer(){
  emRunning=false;clearInterval(emIvl);emRem=0;
  const btn=document.getElementById('em-btnTimer');if(btn){btn.textContent='✓ Concluído';btn.className='em-tbtn em-tbtn-start';}
  const dot=document.getElementById('em-tdot');if(dot)dot.className='em-tdot done';
  const sub=document.getElementById('em-ringSub');if(sub)sub.textContent='concluído!';
  const db=document.getElementById('em-doneBox');if(db)db.classList.add('vis');
  emSaveSession(true);emUpdateRing();
}

function emNewSession(){
  emRunning=false;clearInterval(emIvl);emRem=emDur;
  const btn=document.getElementById('em-btnTimer');if(btn){btn.textContent='▶ Iniciar';btn.className='em-tbtn em-tbtn-start';}
  const dot=document.getElementById('em-tdot');if(dot)dot.className='em-tdot';
  const sub=document.getElementById('em-ringSub');if(sub)sub.textContent='pronto';
  const db=document.getElementById('em-doneBox');if(db)db.classList.remove('vis');
  const ti=document.getElementById('em-taskInp');if(ti)ti.value='';
  document.getElementById('em-step2').classList.remove('active');
  document.getElementById('em-step1').classList.add('active');
  emUpdateRing();
}

function emSaveSession(completed){
  const tn=document.getElementById('em-taskName');
  const task=(tn?tn.textContent:null)||'Sessão';
  const spent=Math.max(1,Math.round((emDur-emRem)/60));
  const now=new Date();
  emSessions.unshift({task,dur:spent,time:now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),ok:completed});
  emTotalMin+=spent;if(completed)emStreak++;
  emRenderSessions();
}

function emRenderSessions(){
  const n=emSessions.length;
  const sc=document.getElementById('em-sessCount');if(sc)sc.textContent=n+' sessão'+(n!==1?'ões':'');
  const st=document.getElementById('em-stTotal');if(st)st.textContent=n;
  const sm=document.getElementById('em-stMin');if(sm)sm.textContent=emTotalMin;
  const ss=document.getElementById('em-stStreak');if(ss)ss.textContent=emStreak;
  const list=document.getElementById('em-sessList');
  if(!list)return;
  if(!n){list.innerHTML='<div class="em-empty">Nenhuma sessão ainda.<br>Inicie seu primeiro foco! 🚀</div>';return;}
  list.innerHTML=emSessions.map(s=>`
    <div class="em-sess-item">
      <div class="em-sess-ico ${s.ok?'em-si-ok':'em-si-int'}">${s.ok?'✓':'–'}</div>
      <div class="em-sess-meta"><div class="em-sess-task">${s.task}</div><div class="em-sess-time">${s.time} · ${s.ok?'concluída':'interrompida'}</div></div>
      <div class="em-sess-dur">${s.dur}min</div>
    </div>`).join('');
}

function emUpdateRing(){
  const prog=document.getElementById('em-ringProg');
  if(prog)prog.style.strokeDashoffset=EM_CIRC*(1-emRem/emDur);
  const rt=document.getElementById('em-ringTime');
  if(rt){const m=Math.floor(emRem/60),s=emRem%60;rt.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
}

function emInit(){
  emBuildTable();
  emBuildTimeGrid();
  emCalcular();
  emUpdateRing();
  ['em-hDormiu','em-hAcordou','em-qualSono','em-energAcor'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('change',emUpdateSonoOntem);
  });
  const ref=document.getElementById('em-btnRef');
  if(ref)ref.addEventListener('click',()=>{
    const ic=document.getElementById('em-rIcon');
    if(ic)ic.classList.add('em-spinning');
    ref.disabled=true;
    emBuildTable();emCalcular();
    setTimeout(()=>{if(ic)ic.classList.remove('em-spinning');ref.disabled=false;},900);
  });
}

let _agendaDate = new Date().toISOString().slice(0,10);
let _agendaShowForm = false;
let _agendaEditId = null;

function _agendaFmt(dateStr){
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
}
function _agendaNav(offset){
  const d = new Date(_agendaDate+'T12:00:00');
  d.setDate(d.getDate()+offset);
  _agendaDate = d.toISOString().slice(0,10);
  _agendaShowForm = false;
  _agendaEditId = null;
  renderModule('notas');
}
function _agendaToday(){
  _agendaDate = new Date().toISOString().slice(0,10);
  _agendaShowForm = false;
  _agendaEditId = null;
  renderModule('notas');
}
function _agendaToggleForm(editId){
  if(editId!=null){ _agendaEditId=editId; _agendaShowForm=true; }
  else { _agendaEditId=null; _agendaShowForm=!_agendaShowForm; }
  renderModule('notas');
}
function _agendaSaveEvent(){
  const title = document.getElementById('ag-title').value.trim();
  const time  = document.getElementById('ag-time').value;
  const dur   = parseInt(document.getElementById('ag-dur').value)||30;
  const cat   = document.getElementById('ag-cat').value;
  const note  = document.getElementById('ag-note').value.trim();
  if(!title||!time){ showToast('Preencha título e horário ⚠️'); return; }
  if(_agendaEditId!=null){
    const ev = AGENDA_EVENTS.find(e=>e.id===_agendaEditId);
    if(ev){ ev.title=title; ev.time=time; ev.dur=dur; ev.cat=cat; ev.note=note; }
  } else {
    const newId = (AGENDA_EVENTS.reduce((m,e)=>Math.max(m,e.id),0))+1;
    AGENDA_EVENTS.push({id:newId,date:_agendaDate,time,dur,title,cat,note});
  }
  _agendaShowForm=false; _agendaEditId=null;
  showToast(_agendaEditId!=null?'Evento atualizado ✅':'Evento adicionado ✅');
  renderModule('notas');
}
function _agendaDeleteEvent(id){
  const idx = AGENDA_EVENTS.findIndex(e=>e.id===id);
  if(idx>-1){ AGENDA_EVENTS.splice(idx,1); showToast('Evento removido 🗑️'); renderModule('notas'); }
}

const AG_CAT_COLOR = {trabalho:'#a855f7',estudo:'#c084fc',saúde:'#10b981',pessoal:'#f59e0b'};
const AG_CAT_TAG   = {trabalho:'tag-blue',estudo:'tag-purple',saúde:'tag-green',pessoal:'tag-orange'};

function renderNotas(s){
  const todayIso = new Date().toISOString().slice(0,10);
  const isToday  = _agendaDate === todayIso;

  /* events of selected day, sorted by time */
  const dayEvs = AGENDA_EVENTS
    .filter(e=>e.date===_agendaDate)
    .sort((a,b)=>a.time.localeCompare(b.time));

  /* week strip */
  const weekBase = new Date(_agendaDate+'T12:00:00');
  const dow = weekBase.getDay(); // 0=sun
  const weekDays = [];
  for(let i=0;i<7;i++){
    const d2=new Date(weekBase); d2.setDate(weekBase.getDate()-dow+i);
    const ds=d2.toISOString().slice(0,10);
    const cnt=AGENDA_EVENTS.filter(e=>e.date===ds).length;
    weekDays.push({ds, label:d2.toLocaleDateString('pt-BR',{weekday:'short'}).slice(0,3), num:d2.getDate(), isToday:ds===todayIso, isSel:ds===_agendaDate, cnt});
  }

  /* edit data */

  /* timeline: hours 05–23 */

    return hours.map(h=>{
      const hStr=String(h).padStart(2,'0')+':00';
      const eventsThisHour = dayEvs.filter(e=>{
        const [eh]=e.time.split(':').map(Number); return eh===h;
      });
      const isNowHour = isToday && nowH===h;
      return `<div class="ag-row${isNowHour?' ag-row-now':''}">
        <span class="ag-hour">${hStr}</span>
        <div class="ag-slot">
          ${isNowHour?`<div class="ag-now-line" style="top:${Math.round(nowM/60*100)}%"><span class="ag-now-dot"></span></div>`:''}
          ${eventsThisHour.map(ev=>{
            const col=AG_CAT_COLOR[ev.cat]||'var(--accent)';
            const tag=AG_CAT_TAG[ev.cat]||'tag-gray';
            return `<div class="ag-event" style="border-left:3px solid ${col};background:${col}18;">
              <div class="ag-ev-head">
                <span class="ag-ev-time">${ev.time} · ${ev.dur}min</span>
                <div class="ag-ev-actions">
                  <button class="ag-ev-btn" onclick="_agendaToggleForm(${ev.id})" title="Editar">✏️</button>
                  <button class="ag-ev-btn" onclick="_agendaDeleteEvent(${ev.id})" title="Excluir">🗑️</button>
                </div>
              </div>
              <p class="ag-ev-title">${ev.title}</p>
              ${ev.note?`<p class="ag-ev-note">${ev.note}</p>`:''}
              <span class="tag ${tag}" style="margin-top:.3rem">${ev.cat}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }

  s.innerHTML=`
  ${'<'}style>
  .ag-wrap{max-width:760px;margin:0 auto;padding:.25rem 0 3rem}
  /* nav */
  .ag-nav{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}

  .ag-nav-btn:hover{border-color:var(--accent);color:var(--accent)}

  .ag-today-btn:hover{border-color:var(--accent);color:var(--accent)}
  .ag-today-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* week strip */
  .ag-week{display:flex;gap:.3rem;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:.25rem}
  .ag-week::-webkit-scrollbar{height:3px}.ag-week::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px}
  .ag-wday{flex:1;min-width:40px;border:1px solid var(--border);border-radius:var(--r);padding:.45rem .3rem;text-align:center;cursor:pointer;transition:all var(--tr);background:var(--bg);position:relative}

  .ag-wday.sel .ag-wcnt{background:rgba(255,255,255,.3);color:#fff}

  .ag-ev-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.2rem}

        ${_agendaShowForm && _agendaEditId==null ? '✕ Fechar' : '+ Evento'}

    <div class="ag-week">
      ${weekDays.map(w=>`
        <div class="ag-wday${w.isSel?' sel':''}${w.isToday&&!w.isSel?' today-mark':''}" onclick="_agendaDate='${w.ds}';_agendaShowForm=false;_agendaEditId=null;renderModule('notas')">

    ${_agendaShowForm ? `

      ${['trabalho','estudo','saúde','pessoal'].map(cat=>{
        const cnt=dayEvs.filter(e=>e.cat===cat).length;
        if(!cnt) return '';
        return `<span class="tag ${AG_CAT_TAG[cat]}">${cat} · ${cnt} evento${cnt>1?'s':''}</span>`;

    </div>` : ''}
  </div>`;
}

async function _submitFeedback(event){
  event.preventDefault();
  const message = document.getElementById('feedback-message')?.value?.trim() || '';
  const category = document.getElementById('feedback-category')?.value || 'Outro';
  const rating = Number(document.getElementById('feedback-rating')?.value || 5);
  if(message.length < 3){
    showToast('Escreva uma mensagem antes de enviar.');
    return;
  }
  try{
    await LifeOSAPI.saveFeedback({ message, category, rating });
    showToast('Feedback salvo no banco. Obrigado! 💜');
    event.target.reset();
  }catch(e){
    console.warn('[LifeOS] Falha ao salvar feedback:', e);
    showToast('Não foi possível salvar o feedback agora.');
  }
}

async function _submitSupport(event){
  event.preventDefault();
  const subject = document.getElementById('support-subject')?.value?.trim() || '';
  const message = document.getElementById('support-message')?.value?.trim() || '';
  if(!subject || message.length < 3){
    showToast('Preencha assunto e descrição.');
    return;
  }
  try{
    await LifeOSAPI.saveSupport({ subject, message });
    showToast('Mensagem de suporte salva no banco. 🆘');
    event.target.reset();
  }catch(e){
    console.warn('[LifeOS] Falha ao salvar suporte:', e);
    showToast('Não foi possível salvar a mensagem agora.');
  }
}

/* ── TABLE ──────────────────────────────────────────────── */
function losRenderTable(){
  const sorted=[...losActive].sort((a,b)=>{
    const va=typeof a[losSortKey]==='number'?a[losSortKey]:String(a[losSortKey]);
    const vb=typeof b[losSortKey]==='number'?b[losSortKey]:String(b[losSortKey]);
    return (va>vb?1:-1)*losSortDir;
  });
  const tbody=document.getElementById('losTbody');
  const cnt=document.getElementById('losCount');
  if(!tbody) return;
  if(cnt) cnt.textContent=`${sorted.length} área${sorted.length!==1?'s':''}`;

  tbody.innerHTML=sorted.map((r,i)=>`
    <tr style="transition-delay:${i*35}ms">
      <td>
        <div class="los-area-cell">
          <span class="los-area-dot" style="background:${r.color}"></span>
          <div>
            <div class="los-a-name">${r.icon} ${r.area}</div>
            <div class="los-a-sub">${r.goal}</div>
          </div>
        </div>
      </td>
      <td style="font-weight:700">${r.total}</td>
      <td style="font-weight:700">${r.sessions.toLocaleString()}</td>
      <td style="color:var(--t2)">${r.focused}</td>
      <td style="font-weight:700">${r.tasks}</td>
      <td>
        <div class="los-bar-wrap">
          <div class="los-bar-bg">
            <div class="los-bar-f" data-bar="${r.progress}" style="background:${r.color}"></div>
          </div>
          <span class="los-bar-pct">${r.progress}%</span>
        </div>
      </td>
      <td><span class="los-badge ${r.badge}">${r.lbl}</span></td>
    </tr>
  `).join('');

  requestAnimationFrame(()=>{
    tbody.querySelectorAll('tr').forEach((tr,i)=>
      setTimeout(()=>{ tr.style.opacity='1'; tr.style.transform='translateY(0)'; }, i*35)
    );
    tbody.querySelectorAll('.los-bar-f').forEach(b=>
      setTimeout(()=>{ b.style.width=b.dataset.bar+'%'; }, 180)
    );
  });
}

function losFilter(){
  const q=(document.getElementById('losSrch')||{}).value?.toLowerCase()||'';
  losActive=LOS_ROWS.filter(r=>r.area.toLowerCase().includes(q)||r.goal.toLowerCase().includes(q));
  losRenderTable();
}

function losSort(k){
  if(losSortKey===k) losSortDir*=-1; else{losSortKey=k;losSortDir=-1;}
  losRenderTable();
}

function losExport(){
  const h=['Area','Objetivo','Dias','Check-ins','Foco','Tarefas','Progresso','Status'];
  const rows=losActive.map(r=>[r.area,r.goal,r.total,r.sessions,r.focused,r.tasks,r.progress+'%',r.lbl].join(','));
  const a=Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(new Blob([[h.join(','),...rows].join('\n')],{type:'text/csv'})),
    download:'lifeos-analytics.csv'
  });
  a.click();
  showToast('CSV exportado ✅');
}
