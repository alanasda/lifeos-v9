/* ─── SVG BAR ────────────────────────────────── */
function svgBar(data){
  const raw = Array.isArray(data) && data.length ? data : [];
  const safeData = normalizeWeeklyPayload(raw);
  const totalPct = safeData.reduce((sum, d) => sum + (Number(d.pct) || 0), 0);
  if (totalPct <= 0) {
    return `<div style="min-height:120px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--t3);font-size:.78rem;line-height:1.5;padding:1rem">
      A semana ainda está zerada. Faça o check-in ou conclua uma tarefa para começar a preencher sua consistência.
    </div>`;
  }
  const W=340,H=130,pL=10,pB=24,pT=14,pR=10;
  const cW=W-pL-pR,cH=H-pB-pT;
  const count=Math.max(safeData.length,1);
  const bW=(cW/count)*0.52,gap=cW/count;
  let bars='',labels='',vals='';
  const jsDay = new Date().getDay();
  const todayIdx = jsDay === 0 ? 6 : jsDay - 1; // segunda=0 ... domingo=6
  const isDark=document.body.classList.contains('dark-theme');
  const colToday = isDark ? '#a855f7' : '#0f0f0f';
  const colOther = isDark ? '#303030' : '#dddddd';
  safeData.forEach((d,i)=>{
    const pct = Math.max(0, Math.min(100, Number(d.pct) || 0));
    const day = d.day || ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'][i] || '';
    const x=pL+i*gap+gap/2-bW/2,bH=Math.max((pct/100)*cH,1),y=pT+cH-bH;
    bars+=`<rect x="${x.toFixed(1)}" y="${H}" width="${bW.toFixed(1)}" height="0" rx="3"
      fill="${i===todayIdx?colToday:colOther}" class="svg-bar"
      data-y="${y.toFixed(1)}" data-h="${bH.toFixed(1)}"
      style="transition:y .9s cubic-bezier(0.34,1.4,0.64,1) ${i*55}ms,height .9s cubic-bezier(0.34,1.4,0.64,1) ${i*55}ms;cursor:pointer"
      onmouseenter="this.setAttribute('opacity','.5')" onmouseleave="this.setAttribute('opacity','1')"/>`;
    labels+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-5}" class="svg-lbl" fill="${isDark?'#888':'#999'}" text-anchor="middle">${day}</text>`;
    vals+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-4}" class="svg-val" fill="${isDark?'#bbb':'#666'}" text-anchor="middle" opacity="0" id="sv-${i}">${pct}%</text>`;
  });
  setTimeout(()=>document.querySelectorAll('.svg-bar').forEach((r,i)=>{
    r.setAttribute('y',r.dataset.y);r.setAttribute('height',r.dataset.h);
    setTimeout(()=>{const v=document.getElementById(`sv-${i}`);if(v)v.setAttribute('opacity','1');},500+i*55);
  }),150);
  const lineCol = isDark ? '#2a2a2a' : '#e8e8e8';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; min-width:200px; overflow:visible">
    <line x1="${pL}" y1="${pT+cH}" x2="${W-pR}" y2="${pT+cH}" stroke="${lineCol}" stroke-width="1"/>
    ${bars}${labels}${vals}
  </svg>`;
}

/* ─── CONTROLE DE CHECK-IN ─── */
function checkCheckinAlert() {
    const alertBox = $('checkin-alert');
    if(!alertBox) return;
    const now = new Date();
    // Exibe após às 19:00 se não estiver feito
    if(now.getHours() >= 19 && !CHECKIN_TODAY.done) {
        alertBox.style.display = 'block';
    } else {
        alertBox.style.display = 'none';
    }
}

/* ─── INIT ───────────────────────────────────── */
function _setLoaderStatus(msg){ const el=$('loader-status'); if(el) el.textContent=msg; }
function _hideLoader(){
  const l=$('app-loader');
  if(!l) return;
  l.style.opacity='0';
  setTimeout(()=>{ l.style.display='none'; }, 420);
}

async function init(){
  // Previne dupla execução
  if (window.__LIFEOS_INIT_RUNNING__) return;
  window.__LIFEOS_INIT_RUNNING__ = true;

  // ── FASE 1: Aplica dados pré-carregados e mostra UI imediatamente ──
  if (window.__PREFETCHED_USER__) {
    const u = window.__PREFETCHED_USER__;
    Object.assign(USER, {
      id:             u.id              || '',
      name:           u.name           || '',
      initials:       u.initials        || '',
      email:          u.email           || '',
      plan:           u.plan            || 'free',
      avatar_url:     u.avatar_url      ?? null,
      progress:       u.progress        ?? 0,
      weekStatus:     u.week_status     || u.weekStatus || '',
      focusScore:     u.focus_score     ?? u.focusScore ?? 0,
      energyLevel:    u.energy_level    ?? u.energyLevel ?? 5,
      level:          u.level           ?? 1,
      totalXP:        u.total_xp        ?? u.totalXP ?? 0,
      streak:         u.current_streak  ?? u.streak ?? 0,
      memberSince:    u.member_since    || u.memberSince || '',
      profession:     u.profession      || '',
      profession_type:u.profession_type || 'gen',
      onboarding_done:u.onboarding_done ?? true,
      bio:            u.bio             || '',
      vision:         u.vision          || '',
      theme:          u.theme           || 'light',
      aiPersonality:  u.ai_personality  || u.aiPersonality || 'coach_motivacional',
      timezone:       u.timezone        || 'America/Sao_Paulo',
      lang:           u.lang            || 'pt-BR',
      currency:       u.currency        || 'BRL',
    });
  }

  // ── FASE 2: Mostra o dashboard IMEDIATAMENTE (não espera API) ──
  _setLoaderStatus('Pronto!');
  _hideLoader();
  renderHeader();
  renderCarousel();
  initTheme();
  initCursorGlow();

  // Atualiza header com dados do usuário
  const ddName  = document.getElementById('dd-name');
  const ddEmail = document.getElementById('dd-email');
  if (ddName)  ddName.textContent  = USER.name  || '';
  if (ddEmail) ddEmail.textContent = USER.email || '';

  // Aplica tema salvo do backend/usuário
  if (USER.theme === 'dark' && !document.body.classList.contains('dark-theme')) {
    document.body.classList.add('dark-theme');
  }

  const hamburgerBtn = document.getElementById('hamburger-btn');
  if (hamburgerBtn) {
    hamburgerBtn.addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('notif-dropdown').classList.remove('open');
      const d = document.getElementById('hamburger-dropdown');
      d.classList.toggle('open');
      hamburgerBtn.setAttribute('aria-expanded', d.classList.contains('open'));
    });
  }
  const notifBtn = document.getElementById('notif-btn');
  if (notifBtn) {
    notifBtn.addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('hamburger-dropdown').classList.remove('open');
      const d = document.getElementById('notif-dropdown');
      d.classList.toggle('open');
      if (d.classList.contains('open')) renderNotifList();
    });
  }
  document.addEventListener('click', () => {
    document.getElementById('hamburger-dropdown')?.classList.remove('open');
    document.getElementById('notif-dropdown')?.classList.remove('open');
  });

  switchModule('workspace');

  // ── FASE 3: Carrega dados completos em background (não bloqueia UI) ──
  setTimeout(async () => {
    try {
      await LifeOSAPI.loadAll();
      // Atualiza UI com dados reais após carregamento
      renderHeader();
      renderModule(activeModule);
      console.log('[LifeOS] Dados carregados em background com sucesso');
    } catch(e) {
      console.warn('[LifeOS] Background load falhou (UI mantida com dados parciais):', e.message);
    }
  }, 300);

  // Salva locale em background
  setTimeout(() => LifeOSAPI._fetch('/user/locale', { method: 'PATCH' }).catch(() => {}), 2000);

  setInterval(checkCheckinAlert, 10000);
  checkCheckinAlert();
}

/* Boot: aguarda init() estar definida antes de chamar — resolve race condition pós-onboarding */
window.__LIFEOS_BOOT__ = function lifeosBoot() {
  if (!window.__LIFEOS_AUTH_READY__) return;
  if (typeof init === 'function') {
    try { init(); } catch (e) { console.error('[LifeOS] init() falhou:', e); _showInitError(e?.message || String(e)); }
    return;
  }
  // init() ainda não foi parseada (race condition) — tenta novamente em intervalos curtos
  let attempts = 0;
  const maxAttempts = 50; // 5 segundos no total
  const retryInterval = setInterval(() => {
    attempts++;
    if (typeof init === 'function') {
      clearInterval(retryInterval);
      try { init(); } catch (e) { console.error('[LifeOS] init() falhou:', e); _showInitError(e?.message || String(e)); }
    } else if (attempts >= maxAttempts) {
      clearInterval(retryInterval);
      console.error('[LifeOS] init() não encontrada após ' + maxAttempts + ' tentativas');
      window.location.href = 'login.html';
    }
  }, 100);
};
if (window.__LIFEOS_AUTH_READY__) {
  window.__LIFEOS_BOOT__();
}

/* ─── LOGOUT ─────────────────────────────────── */
function doLogout() {
  if (typeof firebase !== 'undefined') {
    firebase.auth().signOut().then(() => {
      localStorage.removeItem('lifeos_token');
      localStorage.removeItem('lifeos_onboarding_v5');
      window.location.href = 'login.html';
    }).catch(() => {
      localStorage.clear();
      window.location.href = 'login.html';
    });
  } else {
    localStorage.clear();
    window.location.href = 'login.html';
  }
}
